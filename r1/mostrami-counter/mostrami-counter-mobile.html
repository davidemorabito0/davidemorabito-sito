<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#F1ECE1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="mostraMI">
<title>mostraMI · counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light dark;
    --paper:#F1ECE1; --card:#FBFAF5; --ink:#1C1813; --amber:#E8672B; --petrol:#35555C;
    --muted:#7C7367; --muted2:#A99F90; --line:#E7DFCF; --green:#3FAE5A; --red:#C4553F;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;user-select:none;}
  html,body{height:100%;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex; flex-direction:column; overflow:hidden; cursor:pointer;
    padding:calc(var(--safe-t) + 18px) 20px calc(var(--safe-b) + 14px);
    position:relative;
  }
  /* il dark forzato non deve spegnere la carta */
  @media (prefers-color-scheme: dark){
    html{background:#0d0d0e;}
    body{background:var(--paper)!important;color:var(--ink)!important;}
  }

  .top{flex:0 0 auto;display:flex;align-items:center;gap:11px;}
  .live{width:11px;height:11px;border-radius:50%;background:var(--green);flex:none;
    animation:beat 3s ease-out infinite;}
  .live.err{background:var(--red);animation:none;box-shadow:0 0 0 4px rgba(196,85,63,.16);}
  .live.pulse{animation:lp .55s ease;}
  @keyframes lp{0%{box-shadow:0 0 0 0 rgba(63,174,90,.5)}100%{box-shadow:0 0 0 14px rgba(63,174,90,0)}}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(63,174,90,.42)}
                  55%{box-shadow:0 0 0 13px rgba(63,174,90,0)}
                  100%{box-shadow:0 0 0 0 rgba(63,174,90,0)}}
  .wm{display:flex;flex-direction:column;line-height:1;}
  .wm b{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:clamp(24px,7vw,34px);letter-spacing:-.015em;}
  .wm b i{color:var(--amber);font-style:normal;}
  .wm span{font-size:clamp(9px,2.6vw,12px);letter-spacing:.30em;text-transform:uppercase;
    color:var(--muted2);margin-top:6px;}

  .mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;animation:breathe 5.2s ease-in-out infinite;}
  .aura{position:absolute;width:min(78vw,420px);height:min(78vw,420px);border-radius:50%;pointer-events:none;
    background:radial-gradient(circle, rgba(232,103,43,.34) 0%, rgba(232,103,43,0) 70%);
    animation:aura 5.2s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.022)}}
  @keyframes aura{0%,100%{opacity:.45;transform:scale(.86)}50%{opacity:.95;transform:scale(1.12)}}

  .label{font-size:clamp(11px,3.2vw,15px);letter-spacing:.30em;text-transform:uppercase;
    color:var(--muted);font-weight:600;position:relative;}
  .today{font-family:"Fraunces",Georgia,serif;font-weight:700;color:var(--amber);
    font-size:clamp(88px,34vw,240px);line-height:.92;letter-spacing:-.03em;
    font-variant-numeric:tabular-nums;position:relative;
    text-shadow:0 0 34px rgba(232,103,43,.22);
    transition:transform .16s ease;}
  .today.bump{transform:scale(1.05);}

  .pill{margin-top:clamp(14px,4vw,26px);display:inline-flex;align-items:center;gap:10px;
    background:rgba(28,24,19,.055);border:1px solid var(--line);border-radius:999px;
    box-shadow:inset 0 0 0 1px rgba(232,103,43,.10);
    padding:clamp(9px,2.4vw,14px) clamp(16px,4.5vw,24px);
    font-size:clamp(13px,3.6vw,17px);color:var(--muted);white-space:nowrap;position:relative;}
  .pill svg{width:1.15em;height:1.15em;color:var(--amber);flex:none;}
  .pill b{color:var(--petrol);font-weight:700;font-variant-numeric:tabular-nums;}

  .think{display:flex;gap:8px;justify-content:center;margin-top:clamp(16px,4vw,26px);height:8px;position:relative;}
  .think i{width:7px;height:7px;border-radius:50%;background:var(--muted2);display:block;
    animation:think 1.6s ease-in-out infinite;}
  .think i:nth-child(2){animation-delay:.22s;}
  .think i:nth-child(3){animation-delay:.44s;}
  @keyframes think{0%,100%{opacity:.25;transform:translateY(0)}45%{opacity:.9;transform:translateY(-5px)}}

  .foot{flex:0 0 auto;text-align:center;font-size:clamp(10px,2.8vw,13px);
    letter-spacing:.05em;color:var(--muted2);}
  .foot .msg{color:var(--red);font-weight:600;}
  .spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(124,115,103,.28);
    border-top-color:var(--amber);border-radius:50%;animation:sp .7s linear infinite;
    vertical-align:-1px;margin-right:6px;}
  @keyframes sp{to{transform:rotate(360deg)}}

  .tick{position:absolute;left:0;bottom:0;height:3px;width:0;background:var(--amber);opacity:.85;}
  .tick.run{animation:tick 15s linear forwards;}
  @keyframes tick{from{width:0}to{width:100%}}

  body.busy .mid{animation-duration:1.6s;}
  body.busy .aura{animation-duration:1.6s;}
  body.busy .think i{animation-duration:.7s;}

  @media (prefers-reduced-motion: reduce){
    .mid,.aura,.think i,.live,.tick.run{animation:none!important;}
  }
  /* telefono in orizzontale: numero e pill affiancati */
  @media (orientation:landscape) and (max-height:520px){
    .today{font-size:clamp(70px,20vh,150px);}
    .aura{width:min(46vh,320px);height:min(46vh,320px);}
  }
</style>
</head>
<body>
  <div class="top">
    <span class="live" id="live"></span>
    <span class="wm"><b>mostra<i>MI</i></b><span>Milano · counter</span></span>
  </div>

  <div class="mid">
    <span class="aura"></span>
    <div class="label">Utenti oggi</div>
    <div class="today" id="today">—</div>
    <div class="pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <b id="monthN">—</b>&nbsp;utenti questo mese
    </div>
    <div class="think"><i></i><i></i><i></i></div>
  </div>

  <div class="foot" id="foot">tocca per aggiornare</div>
  <div class="tick" id="tick"></div>

<script>
(function(){
  "use strict";
  // dati letti direttamente da Supabase (chiave anon pubblica, come nel sito mostraMI)
  var SB_URL = "https://yfatwqryeoobaqkivqic.supabase.co";
  var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmYXR3cXJ5ZW9vYmFxa2l2cWljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTkyMDEsImV4cCI6MjA5ODA3NTIwMX0.rHnKaY8JvXPZgd3HrHP2jptD3XzzhUvf5CckKHNX5_E";

  var $=function(id){return document.getElementById(id);};
  var elToday=$("today"), elMonth=$("monthN"), elFoot=$("foot"), elLive=$("live"), elTick=$("tick");

  function pad(n){return (n<10?"0":"")+n;}
  function monthKey(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1); }
  function todayStartISO(){ var d=new Date(); d.setHours(0,0,0,0); return d.toISOString(); }
  function fmt(n){ n=Number(n); return isFinite(n)?n.toLocaleString("it-IT"):"—"; }
  function timeNow(){ var d=new Date(); return pad(d.getHours())+":"+pad(d.getMinutes()); }

  function setToday(v){
    elToday.textContent=fmt(v);
    elToday.classList.remove("bump"); void elToday.offsetWidth; elToday.classList.add("bump");
  }
  function restartTick(){
    elTick.classList.remove("run"); void elTick.offsetWidth; elTick.classList.add("run");
  }

  async function countVisits(extra){
    var url = SB_URL + "/rest/v1/visits?select=id&month=eq." + encodeURIComponent(monthKey()) + (extra||"");
    var res = await fetch(url, { method:"HEAD", headers:{
      apikey:SB_KEY, Authorization:"Bearer "+SB_KEY, Prefer:"count=exact"
    }});
    var cr = res.headers.get("content-range") || "";
    var n = parseInt((cr.split("/")[1]||"0"),10);
    return isNaN(n)?0:n;
  }

  function loading(){
    document.body.classList.add("busy");
    elLive.className="live";
    elFoot.innerHTML='<span class="spin"></span>aggiorno…';
  }
  function ok(){
    document.body.classList.remove("busy");
    elLive.className="live pulse";
    setTimeout(function(){ elLive.className="live"; },560);
    elFoot.textContent="aggiornato "+timeNow()+" · tocca per aggiornare";
    restartTick();
  }
  function err(t){
    document.body.classList.remove("busy");
    elLive.className="live err";
    elFoot.innerHTML='<span class="msg">'+t+'</span>';
    restartTick();
  }

  var busy=false;
  async function load(){
    if(busy) return; busy=true;
    loading();
    try{
      var month = await countVisits("");
      var today = await countVisits("&created_at=gte." + encodeURIComponent(todayStartISO()));
      setToday(today);
      elMonth.textContent=fmt(month);
      ok();
    }catch(e){
      err("Supabase non raggiungibile");
    }
    busy=false;
  }

  document.addEventListener("pointerdown",load);
  document.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){e.preventDefault();load();} });
  document.addEventListener("visibilitychange",function(){ if(!document.hidden) load(); });

  load();
  setInterval(load, 15000);   // aggiornamento ogni 15 secondi
})();
</script>
</body>
</html>
