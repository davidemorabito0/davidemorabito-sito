<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Installa FARTFLIP sul tuo R1</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0e0e10;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;}
  .brand{font-size:11px;letter-spacing:.2em;color:#FE5000;text-transform:uppercase;margin-bottom:12px;}
  h1{font-size:28px;font-weight:800;margin-bottom:6px;letter-spacing:.3px;color:#FE5000;}
  .sub{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:20px;text-align:center;max-width:290px;line-height:1.45;}
  #qr{margin-bottom:16px;border-radius:12px;overflow:hidden;background:#fff;line-height:0;padding:0;}
  .url{font-size:10px;color:rgba(255,255,255,.32);word-break:break-all;text-align:center;max-width:320px;}
  .note{margin-top:20px;font-size:11px;color:rgba(255,255,255,.42);max-width:320px;text-align:center;line-height:1.5;}
  .note code{color:#FE5000;font-family:ui-monospace,Menlo,Consolas,monospace;}
</style>
</head>
<body>
  <div class="brand">rabbit r1 creation</div>
  <h1>FARTFLIP</h1>
  <p class="sub">Sull'R1: apri <b>Creations</b> &rarr; <b>add via QR code</b> &rarr; inquadra questo codice.</p>
  <div id="qr"></div>
  <div class="url" id="url-label"></div>
  <p class="note">Per aggiornare la app dopo una modifica: aggiungi <code>?v=2</code> in fondo all'URL nello script e rigenera il QR.</p>

  <script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
  <script>
    var creationUrl = 'https://davidemorabito.com/r1/fartflip/fartflip.html';
    document.getElementById('url-label').textContent = creationUrl;
    var qrData = JSON.stringify({
      title: "FARTFLIP",
      url: creationUrl,
      description: "Runner: salta, doppio salto a scoreggia.",
      iconUrl: "",
      themeColor: "#FE5000"
    });
    var qrCode = new QRCodeStyling({
      width:300, height:300, margin:16,
      data:qrData,
      qrOptions:{ errorCorrectionLevel:"L" },
      dotsOptions:{ color:"#000000", type:"square" },
      backgroundOptions:{ color:"#ffffff" },
      cornersSquareOptions:{ color:"#000000", type:"square" },
      cornersDotOptions:{ color:"#000000" }
    });
    qrCode.append(document.getElementById('qr'));
  </script>
</body>
</html>
