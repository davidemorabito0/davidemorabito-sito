<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>FARTFLIP</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;user-select:none;}
  html{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body{width:240px;height:282px;overflow:hidden;background:#0a0a0b;cursor:pointer;
    box-shadow:0 0 0 1px rgba(255,255,255,.05),0 24px 70px rgba(0,0,0,.6);}
  canvas{display:block;width:240px;height:282px;image-rendering:pixelated;}
</style>
</head>
<body>
<canvas id="c" width="240" height="282"></canvas>
<script>
(function(){
  "use strict";
  var W=240,H=282;
  var cv=document.getElementById("c"),ctx=cv.getContext("2d");
  ctx.imageSmoothingEnabled=false;

  // palette (stile Rabbit: nero + arancione, minimal)
  var BG="#0a0a0b", ORANGE="#FE5000", ORANGE_DK="#b83a00", WHITE="#f2f2f2",
      FACE="#f4eee4", GREY="#c9c9cf", GREY_DK="#83838a", GREEN="#a7d18a", INK="#0a0a0b",
      GOLD="#FFC24A", PUNCH="#5AC8FF", SUPER="#8BE05A", HEART="#FF5A6E";

  var SKINS=[
    {n:"PAZZO", c:"#FE5000", d:"#B83A00", f:"#F4EEE4", hair:"spiky", eyes:"crazy",  mouth:"grin"},
    {n:"LUNA",  c:"#8B5CF6", d:"#5B32B0", f:"#EFE6FB", hair:"flat",  eyes:"sleepy", mouth:"smirk"},
    {n:"MENTA", c:"#2FD37E", d:"#179153", f:"#E7FAF0", hair:"tuft",  eyes:"wide",   mouth:"tongue"}
  ];
  var skin=0;
  try{ var sk0=parseInt(localStorage.getItem("fartflip_skin")||"0",10); if(!isNaN(sk0)&&sk0>=0&&sk0<SKINS.length) skin=sk0; }catch(e){}
  function setSkin(i){ skin=(i+SKINS.length)%SKINS.length; try{localStorage.setItem("fartflip_skin",String(skin));}catch(e){} }

  var GROUND_Y=238, PW=22, PH=30, PX=44;
  var GRAV=0.85, JUMP_V=-12.5, DJUMP_V=-11.2;
  var TOP_MARGIN=2, GLIDE_FALL=1.4, GLIDE_MAX=120; // planata: max ~2s, sempre a schermo
  var MAX_LIVES=3, HURT_TIME=1.15, INV_TIME=7;     // vite, invulnerabilita' dopo il colpo, power-up
  var BOX_PER_POWER=15;                            // power-up ogni 15 box saltati
  var LEVEL_BOXES=25;                              // box da saltare per completare un livello
  var MAX_LEVEL=10;                                // ultimo livello: si arriva a casa (gabinetto)
  var SPEED_START=2.5, SPEED_RAMP=0.0016, SPEED_CAP=5.5; // sale a lungo, cap alto + bonus livello
  var POWER_MUL=2.0;                               // durante l'invincibilita' i box arrivano al 200%
  var PUNCH_MAX=1, SUPER_MAX=5;                    // 1 pugno / 5 scoregge potenziate
  var START_LIVES=1, HEART_EVERY=7;                // si parte con 1 vita, cuore ogni 7 box
  var SUPER_JUMP_V=-13.0, SUPER_DJUMP_V=-11.5, SUPER_GRAV=0.42; // salti lunghi e fluttuanti

  var best=0;
  try{var b=parseInt(localStorage.getItem("fartflip_best")||"0",10);if(!isNaN(b))best=b;}catch(e){}

  var state="ready"; // ready | play | over
  var py,vy,grounded,jumps,flipT,flipDur,legTimer;
  var enemies,parts,powers,worldSpeed,distNext,scoreF,score,groundOff,bgOff;
  var deathFlash,overLock,lastMile,scorePulse,hitFlash;
  var lives,hurtT,invT,boxSince,heartSince,speedMul,punchCharges,superJumps,superFlight;
  var punchT,punchX,punchY,trickPose,flipDir,flipTurns,level,lvlBoxes,levelT,bullets,countT,lastCount;
  var introT,winT,goal;
  var holding=false, gliding=false, prevGliding=false, glideTrail=0, glideFrames=0;

  function reset(){
    py=GROUND_Y-PH; vy=0; grounded=true; jumps=0; flipT=0; flipDur=30; legTimer=0;
    enemies=[]; parts=[]; powers=[]; worldSpeed=SPEED_START; distNext=150; scoreF=0; score=0;
    groundOff=0; bgOff=0; deathFlash=0; lastMile=0; scorePulse=0; hitFlash=0;
    lives=START_LIVES; hurtT=0; invT=0; boxSince=0; heartSince=0; speedMul=1; beatMode="normal";
    punchCharges=0; superJumps=0; superFlight=false;
    punchT=0; punchX=0; punchY=0; trickPose=null; flipDir=-1; flipTurns=1;
    level=1; lvlBoxes=0; levelT=0; bullets=[]; countT=0; lastCount=9;
    introT=0; winT=0; goal=null;
    gliding=false; prevGliding=false; glideTrail=0; glideFrames=0; stopGlideSfx();
  }

  // ---- audio + aptico ----
  var actx=null, unlocked=false;
  function ac(){try{if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();}catch(e){}return actx;}
  function unlockAudio(){
    var c=ac(); if(!c||unlocked)return; unlocked=true;
    try{var b=c.createBuffer(1,1,22050),s=c.createBufferSource();s.buffer=b;s.connect(c.destination);s.start(0);}catch(e){}
  }
  function vibe(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

  // salto singolo: "pft" corto e acuto
  function sfxJump(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    var o=c.createOscillator(), g=c.createGain(), lp=c.createBiquadFilter();
    o.type="sawtooth";
    o.frequency.setValueAtTime(190,t); o.frequency.exponentialRampToValueAtTime(95,t+0.11);
    lp.type="lowpass"; lp.frequency.value=780;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.24,t+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.14);
    o.connect(lp); lp.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t+0.16);
  }
  // doppio salto: "BRRRAAAP" lungo e basso
  function sfxDouble(){
    var c=ac(); if(!c)return; var t=c.currentTime, dur=0.34;
    var o=c.createOscillator(), g=c.createGain(), lp=c.createBiquadFilter();
    o.type="sawtooth";
    o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(42,t+dur);
    var lfo=c.createOscillator(), lg=c.createGain();
    lfo.type="square"; lfo.frequency.value=23; lg.gain.value=26;
    lfo.connect(lg); lg.connect(o.frequency);
    lp.type="lowpass"; lp.frequency.value=430;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.26,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.14,t+dur*0.6);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(lp); lp.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t+dur+0.03); lfo.start(t); lfo.stop(t+dur+0.03);
  }
  function sfxTick(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    var o=c.createOscillator(), g=c.createGain();
    o.type="triangle";
    o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(1320,t+0.06);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.13,t+0.006); g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.13);
  }
  // testata sul nemico: "bonk" morbido
  function sfxStomp(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    var o=c.createOscillator(), g=c.createGain();
    o.type="square";
    o.frequency.setValueAtTime(320,t); o.frequency.exponentialRampToValueAtTime(120,t+0.09);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.17,t+0.006); g.gain.exponentialRampToValueAtTime(0.0001,t+0.11);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.12);
  }
  // colpo subito
  function sfxHurt(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    var o=c.createOscillator(), g=c.createGain();
    o.type="square";
    o.frequency.setValueAtTime(260,t); o.frequency.exponentialRampToValueAtTime(70,t+0.3);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.3,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.34);
  }
  // power-up preso: arpeggio ascendente
  function sfxPower(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    [523,659,784,1047].forEach(function(f,i){
      var o=c.createOscillator(), g=c.createGain(), tt=t+i*0.07;
      o.type="triangle"; o.frequency.setValueAtTime(f,tt);
      g.gain.setValueAtTime(0.0001,tt);
      g.gain.exponentialRampToValueAtTime(0.2,tt+0.008);
      g.gain.exponentialRampToValueAtTime(0.0001,tt+0.16);
      o.connect(g); g.connect(c.destination); o.start(tt); o.stop(tt+0.18);
    });
  }
  function sfxSpawnPower(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    [784,1175].forEach(function(f,i){
      var o=c.createOscillator(), g=c.createGain(), tt=t+i*0.1;
      o.type="sine"; o.frequency.setValueAtTime(f,tt);
      g.gain.setValueAtTime(0.0001,tt);
      g.gain.exponentialRampToValueAtTime(0.13,tt+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,tt+0.28);
      o.connect(g); g.connect(c.destination); o.start(tt); o.stop(tt+0.3);
    });
  }
  function sfxPunch(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    // impatto secco + coda bassa
    var o=c.createOscillator(), g=c.createGain(), lp=c.createBiquadFilter();
    o.type="square";
    o.frequency.setValueAtTime(420,t); o.frequency.exponentialRampToValueAtTime(60,t+0.14);
    lp.type="lowpass"; lp.frequency.value=1400;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.34,t+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
    o.connect(lp); lp.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t+0.2);
    var s=c.createBufferSource(), ng=c.createGain(), hp=c.createBiquadFilter();
    s.buffer=getNoise(c); hp.type="highpass"; hp.frequency.value=1200;
    ng.gain.setValueAtTime(0.2,t); ng.gain.exponentialRampToValueAtTime(0.0001,t+0.09);
    s.connect(hp); hp.connect(ng); ng.connect(c.destination);
    s.start(t); s.stop(t+0.1);
  }
  function sfxLeap(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    var o=c.createOscillator(), g=c.createGain();
    o.type="triangle";
    o.frequency.setValueAtTime(170,t); o.frequency.exponentialRampToValueAtTime(430,t+0.12);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.12,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.18);
  }
  function sfxShoot(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    var o=c.createOscillator(), g=c.createGain(), bp=c.createBiquadFilter();
    o.type="square";
    o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(180,t+0.16);
    bp.type="bandpass"; bp.frequency.value=900; bp.Q.value=3;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+0.006); g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
    o.connect(bp); bp.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.2);
  }
  function sfxCount(go){
    var c=ac(); if(!c)return; var t=c.currentTime;
    var o=c.createOscillator(), g=c.createGain();
    o.type="square"; o.frequency.setValueAtTime(go?1046:523,t);
    if(go) o.frequency.exponentialRampToValueAtTime(1568,t+0.14);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.2,t+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(go?0.3:0.14));
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+(go?0.32:0.16));
  }
  function sfxGroan(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    var o=c.createOscillator(); o.type="sawtooth";
    o.frequency.setValueAtTime(190,t); o.frequency.linearRampToValueAtTime(105,t+0.7);
    var g=c.createGain(); g.gain.value=0.0001;
    var b1=c.createBiquadFilter(); b1.type="bandpass"; b1.frequency.value=420; b1.Q.value=6;
    var b2=c.createBiquadFilter(); b2.type="bandpass"; b2.frequency.value=1100; b2.Q.value=8;
    var g1=c.createGain(); g1.gain.value=1.4; var g2=c.createGain(); g2.gain.value=0.8;
    o.connect(b1); b1.connect(g1); g1.connect(g);
    o.connect(b2); b2.connect(g2); g2.connect(g);
    g.connect(c.destination);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.42,t+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.72);
    o.start(t); o.stop(t+0.78);
  }
  function sfxFlush(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    var sN=c.createBufferSource(), g=c.createGain(), bp=c.createBiquadFilter();
    sN.buffer=getNoise(c); sN.loop=true;
    bp.type="bandpass"; bp.frequency.setValueAtTime(700,t); bp.frequency.exponentialRampToValueAtTime(2200,t+0.9); bp.Q.value=1.2;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.2,t+0.12);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.5);
    sN.connect(bp); bp.connect(g); g.connect(c.destination);
    sN.start(t); sN.stop(t+1.55);
  }
  function sfxWin(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    [523,659,784,1047,1319,1568].forEach(function(fq,i){
      var o=c.createOscillator(), g=c.createGain(), tt=t+i*0.11;
      o.type="square"; o.frequency.setValueAtTime(fq,tt);
      g.gain.setValueAtTime(0.0001,tt);
      g.gain.exponentialRampToValueAtTime(0.2,tt+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,tt+0.3);
      o.connect(g); g.connect(c.destination); o.start(tt); o.stop(tt+0.32);
    });
    sfxFlush();
  }
  function sfxHeart(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    [659,880,1319].forEach(function(f,i){
      var o=c.createOscillator(), g=c.createGain(), tt=t+i*0.08;
      o.type="sine"; o.frequency.setValueAtTime(f,tt);
      g.gain.setValueAtTime(0.0001,tt);
      g.gain.exponentialRampToValueAtTime(0.18,tt+0.008);
      g.gain.exponentialRampToValueAtTime(0.0001,tt+0.2);
      o.connect(g); g.connect(c.destination); o.start(tt); o.stop(tt+0.22);
    });
  }
  // vocina del personaggio sul doppio salto (formanti = suona come una voce)
  function sfxVoice(){
    var c=ac(); if(!c)return; var t=c.currentTime+0.05; // parte subito dopo l'attacco della scoreggia
    var V=[
      {f0:290,f1:340,f2:920, syl:[[0,0.14],[0.16,0.34]], up:1.6 },  // "wa-hoo"
      {f0:340,f1:750,f2:1150,syl:[[0,0.24]],             up:0.7 },  // "yeah"
      {f0:240,f1:320,f2:900, syl:[[0,0.34]],             up:1.85},  // "wooo"
      {f0:320,f1:560,f2:1900,syl:[[0,0.12],[0.14,0.30]], up:0.8 },  // "op-la"
      {f0:380,f1:300,f2:2350,syl:[[0,0.18]],             up:1.95}   // "yiih"
    ];
    var v=V[Math.floor(Math.random()*V.length)];
    var end=v.syl[v.syl.length-1][1];
    var o=c.createOscillator(); o.type="sawtooth";
    o.frequency.setValueAtTime(v.f0,t);
    o.frequency.linearRampToValueAtTime(v.f0*v.up,t+end);
    var g=c.createGain(); g.gain.value=0.0001;
    var b1=c.createBiquadFilter(); b1.type="bandpass"; b1.frequency.value=v.f1; b1.Q.value=6;
    var b2=c.createBiquadFilter(); b2.type="bandpass"; b2.frequency.value=v.f2; b2.Q.value=8;
    var g1=c.createGain(); g1.gain.value=1.5;
    var g2=c.createGain(); g2.gain.value=0.9;
    var dry=c.createGain(); dry.gain.value=0.12;
    o.connect(b1); b1.connect(g1); g1.connect(g);
    o.connect(b2); b2.connect(g2); g2.connect(g);
    o.connect(dry); dry.connect(g);
    g.connect(c.destination);
    for(var i=0;i<v.syl.length;i++){
      var s0=v.syl[i][0], s1=v.syl[i][1];
      g.gain.setValueAtTime(0.0001,t+s0);
      g.gain.exponentialRampToValueAtTime(0.6,t+s0+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+s1);
    }
    o.start(t); o.stop(t+end+0.06);
  }
  // super scoreggia: piu' lunga, piu' bassa, piu' grassa
  function sfxSuper(){
    var c=ac(); if(!c)return; var t=c.currentTime, dur=0.55;
    var o=c.createOscillator(), g=c.createGain(), lp=c.createBiquadFilter();
    o.type="sawtooth";
    o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(34,t+dur);
    var lfo=c.createOscillator(), lg=c.createGain();
    lfo.type="square"; lfo.frequency.value=17; lg.gain.value=30;
    lfo.connect(lg); lg.connect(o.frequency);
    lp.type="lowpass"; lp.frequency.value=380;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.38,t+0.015);
    g.gain.exponentialRampToValueAtTime(0.16,t+dur*0.6);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(lp); lp.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t+dur+0.03); lfo.start(t); lfo.stop(t+dur+0.03);
  }
  function sfxInvEnd(){
    var c=ac(); if(!c)return; var t=c.currentTime;
    var o=c.createOscillator(), g=c.createGain();
    o.type="triangle"; o.frequency.setValueAtTime(700,t); o.frequency.exponentialRampToValueAtTime(300,t+0.2);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.12,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.24);
  }

  // planata: sibilo continuo
  var glideNode=null, glideGain=null, glideWob=null;
  function startGlideSfx(){
    var c=ac(); if(!c||glideNode)return;
    try{
      glideNode=c.createOscillator(); glideGain=c.createGain();
      var lp=c.createBiquadFilter();
      glideNode.type="sawtooth"; glideNode.frequency.value=68;
      glideWob=c.createOscillator(); var wg=c.createGain();
      glideWob.type="sine"; glideWob.frequency.value=9; wg.gain.value=6;
      glideWob.connect(wg); wg.connect(glideNode.frequency);
      lp.type="lowpass"; lp.frequency.value=360;
      glideGain.gain.value=0.0001;
      glideNode.connect(lp); lp.connect(glideGain); glideGain.connect(c.destination);
      glideNode.start(); glideWob.start();
      glideGain.gain.linearRampToValueAtTime(0.07,c.currentTime+0.08);
    }catch(e){}
  }
  function stopGlideSfx(){
    if(!glideNode)return;
    var n=glideNode, w=glideWob, g=glideGain;
    try{ var c=ac(), t=c?c.currentTime:0;
      if(g&&c){ g.gain.cancelScheduledValues(t); g.gain.setValueAtTime(g.gain.value,t); g.gain.linearRampToValueAtTime(0.0001,t+0.06); }
    }catch(e){}
    setTimeout(function(){ try{n.stop();}catch(e){} try{if(w)w.stop();}catch(e){} },90);
    glideNode=null; glideGain=null; glideWob=null;
  }

  // ---- beat di sottofondo ----
  var BPM=150, beatOn=false, beatStep=0, beatNext=0, beatTimer=null, noiseBuf=null, beatMode="normal";
  var BASS=[55,0,0,55, 0,0,73.42,0, 55,0,0,49, 0,65.41,0,73.42];
  var BASS_P=[110,0,110,0, 146.83,0,110,0, 98,0,98,0, 130.81,0,146.83,0];
  var LEAD_P=[1046.5,0,783.99,0, 880,0,1046.5,0, 1174.7,0,880,0, 1046.5,0,783.99,0];
  function getNoise(c){
    if(noiseBuf) return noiseBuf;
    var n=Math.floor(c.sampleRate*0.2), b=c.createBuffer(1,n,c.sampleRate), d=b.getChannelData(0);
    for(var i=0;i<n;i++) d[i]=Math.random()*2-1;
    noiseBuf=b; return b;
  }
  function bKick(c,t){
    var o=c.createOscillator(), g=c.createGain();
    o.type="sine";
    o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(45,t+0.11);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.3,t+0.006); g.gain.exponentialRampToValueAtTime(0.0001,t+0.17);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.19);

  function bHat(c,t,loud){
    var s=c.createBufferSource(), g=c.createGain(), hp=c.createBiquadFilter();
    s.buffer=getNoise(c);

  function bBass(c,t,freq){

    lp.type="lowpass"; lp.frequency.value=500;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.11,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+0.17);
    o.connect(lp); lp.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t+0.19);

  function beatAt(c,i,t){

      if(i%2===0) bKick(c,t);

      var fp=BASS_P[i]; if(fp) bBass(c,t,fp);
      var fl=LEAD_P[i]; if(fl) bLead(c,t,fl);
      return;
    }
    if(i%4===0) bKick(c,t);
    if(i===10) bKick(c,t);
    if(i%2===1) bHat(c,t,false);
    if(i%4===2) bHat(c,t,true);
    var f=BASS[i]; if(f) bBass(c,t,f);
  }

      while(beatNext < c2.currentTime+0.16 && guard++<24){

        beatStep=(beatStep+1)%16;

  var LVL_ACC=[[ORANGE,ORANGE_DK],[GOLD,"#B8862B"],["#FF4D6D","#A8324A"],

  // ---- input ----
  function startTrick(){

  function spawn(){
    var r=Math.random(), t;
    if(level<=1) t="base";
    else if(level===2) t=(r<0.7?"wide":"base");
    else if(level===3) t=(r<0.55?"hop":(r<0.8?"wide":"base"));
    else if(level===4) t=(r<0.4?"hop":(r<0.7?"wide":"base"));
    else if(level<=6)  t=(r<0.45?"leap":(r<0.65?"hop":(r<0.85?"wide":"base")));
    else               t=(r<0.28?"shoot":(r<0.58?"leap":(r<0.74?"hop":(r<0.9?"wide":"base"))));
    var e={x:W+Math.random()*18, ph:0, pt:0, extra:Math.random()*0.6, ridden:false, passed:false,
           type:t, off:0, vy:0, dash:0, jt:30+Math.random()*60, fire:50+Math.random()*60};
    if(t==="wide"){ e.h=[16,20,26][Math.floor(Math.random()*3)]; e.w=30+Math.floor(Math.random()*19); }
    else if(t==="hop"){ e.h=16+Math.floor(Math.random()*8); e.w=15+Math.floor(Math.random()*8); }
    else if(t==="leap"){ e.h=18+Math.floor(Math.random()*7); e.w=16+Math.floor(Math.random()*7); }
    else if(t==="shoot"){ e.h=24+Math.floor(Math.random()*7); e.w=17+Math.floor(Math.random()*6); }
    else { var q=Math.random(); e.h=q<0.55?18:q<0.85?24:30; e.w=15+Math.floor(Math.random()*8); }
    enemies.push(e);
    distNext = 80 + e.w + worldSpeed*8 + Math.random()*90;

  function spawnPower(){

  }

  function update(f){
    var dt=f/60;
    var baseSpeed = SPEED_START + levelBonus(level) + Math.min(lvlBoxes*0.03, 0.9);
    var targetMul = invT>0 ? POWER_MUL : 1;
    var rate = invT>0 ? 0.09 : 0.035;              // accelera in fretta, rallenta dolcemente
    speedMul += (targetMul-speedMul)*rate*f;
    worldSpeed = baseSpeed * speedMul;
    groundOff=(groundOff+worldSpeed*f)%16;
    bgOff=(bgOff+worldSpeed*0.4*f)%60;

    if(hurtT>0) hurtT-=dt;
    if(invT>0){
      invT-=dt;
      if(invT<=0){ invT=0; beatMode="normal"; hurtT=0.7; sfxInvEnd(); } // breve grazia al rientro
    }

    var prevBottom=py+PH;

    // planata (max 2s, mai fuori schermo)
    var wantGlide = holding && jumps>=2 && !grounded && glideFrames<GLIDE_MAX;
    gliding=wantGlide;
    if(gliding){ glideFrames+=f; vy += (GLIDE_FALL-vy)*0.18*f; }
    else { vy += (superFlight?SUPER_GRAV:GRAV)*f; }
    py += vy*f;
    if(py<TOP_MARGIN){ py=TOP_MARGIN; if(vy<0) vy=0; }

    grounded=false;
    if(py+PH>=GROUND_Y){ py=GROUND_Y-PH; vy=0; grounded=true; jumps=0; glideFrames=0; superFlight=false; trickPose=null; }
    if(flipT>0){ flipT+=f; if(flipT>=flipDur) flipT=0; }

    // nemici (in pausa durante il cambio livello)
    if(levelT>0){ levelT-=f; }
    else if(!goal){
      distNext-=worldSpeed*f;
      if(distNext<=0) spawn();
    }
    for(var i=enemies.length-1;i>=0;i--){
      var e=enemies[i];
      e.x-=(worldSpeed+e.extra)*f;
      if(e.type==="hop"){                   // saltella sul posto
        if(e.off<=0){ e.jt-=f; if(e.jt<=0){ e.vy=3.2+Math.random()*1.4; e.jt=45+Math.random()*75; } }
        if(e.vy>0 || e.off>0){ e.off+=e.vy*f; e.vy-=0.28*f; if(e.off<=0){ e.off=0; e.vy=0; } }
      }else if(e.type==="leap"){            // ti salta addosso
        if(e.off<=0){ e.jt-=f; if(e.jt<=0 && e.x<W-20){ e.vy=4.4+Math.random()*1.2; e.dash=2.6; e.jt=70+Math.random()*70; sfxLeap(); } }
        if(e.vy>0 || e.off>0){ e.off+=e.vy*f; e.vy-=0.30*f; if(e.off<=0){ e.off=0; e.vy=0; } }
        if(e.dash>0){ e.x-=e.dash*f; e.dash-=0.06*f; if(e.dash<0) e.dash=0; }
      }else if(e.type==="shoot"){           // spara un colpo da saltare
        if(e.x<W-6 && e.x>PX+34){
          e.fire-=f;
          if(e.fire<=0){ e.fire=95+Math.random()*95;
            bullets.push({x:e.x, y:GROUND_Y-11, vx:-(worldSpeed+2.6), t:0});
            sfxShoot();
          }
        }
      }
      e.pt+=f; if(e.pt>5){e.pt=0;e.ph=e.ph?0:1;}
      if(!e.passed && e.x+e.w < PX){        // box saltato
        e.passed=true;
        lvlBoxes++;                          // il progresso di livello conta sempre
        if(invT<=0){                        // per i power-up invece l'invincibilita' NON conta
          boxSince++;
          if(boxSince>=BOX_PER_POWER){ boxSince=0; spawnPower(); sfxSpawnPower(); }
          heartSince++;
          if(heartSince>=HEART_EVERY){ heartSince=0; if(lives<MAX_LIVES) spawnHeart(); }
        }
      }
      if(e.x+e.w< -4) enemies.splice(i,1);
    }

    if(lvlBoxes>=LEVEL_BOXES && levelT<=0 && !goal){
      if(level<MAX_LEVEL) levelUp(); else startFinale();
    }
    if(goal){
      goal.x-=worldSpeed*f;
      if(goal.x<=PX+PW+2){ win(); return; }
    }

    // atterraggio sulla TESTA dei nemici -> ci si scivola sopra
    if(!grounded && vy>0){
      for(var s=0;s<enemies.length;s++){
        var en=enemies[s], ey=GROUND_Y-en.h-(en.off||0);
        var overX = (PX+3 < en.x+en.w-2) && (PX+PW-3 > en.x+2);
        if(overX && prevBottom<=ey+4 && py+PH>=ey){
          py=ey-PH; vy=0; grounded=true; jumps=0; glideFrames=0; superFlight=false; trickPose=null;
          if(!en.ridden){ en.ridden=true; sfxStomp(); vibe(10); sparks(GREY,4,PX+PW/2,ey); }
          break;
        }
      }
    }

    // power-up
    for(var p=powers.length-1;p>=0;p--){
      var pw=powers[p];
      pw.x-=worldSpeed*f; pw.t+=f;
      var cy=pw.y+Math.sin(pw.t*0.055)*13;   // su e giu', senza mai salire troppo
      var dx=Math.max(Math.abs((PX+PW/2)-pw.x)-PW/2,0);
      var dy=Math.max(Math.abs((py+PH/2)-cy)-PH/2,0);
      if(!pw.got && dx*dx+dy*dy < 144){
        pw.got=true;
        if(pw.kind==="punch"){
          punchCharges=PUNCH_MAX; sparks(PUNCH,16,pw.x,cy); sfxPower(); vibe([0,20,30,20]);
        } else if(pw.kind==="super"){
          superJumps=SUPER_MAX; sparks(SUPER,16,pw.x,cy); sfxPower(); vibe([0,20,30,20]);
        } else if(pw.kind==="heart"){
          lives=Math.min(MAX_LIVES,lives+1); sparks(HEART,14,pw.x,cy); sfxHeart(); vibe([0,20,40,20]);
        } else {
          invT=INV_TIME; beatMode="power"; sparks(GOLD,16,pw.x,cy); sfxPower(); vibe([0,25,40,25,40,30]);
        }
        powers.splice(p,1); continue;
      }
      if(pw.x< -14) powers.splice(p,1);
    }

    // proiettili
    for(var bi=bullets.length-1;bi>=0;bi--){
      var bl=bullets[bi];
      bl.x+=bl.vx*f; bl.t+=f;
      if(bl.x<-12){ bullets.splice(bi,1); continue; }
      if(invT>0 || hurtT>0) continue;
      var bx=Math.max(Math.abs((PX+PW/2)-bl.x)-PW/2+2,0);
      var by=Math.max(Math.abs((py+PH/2)-bl.y)-PH/2+2,0);
      if(bx*bx+by*by < 30){
        if(punchCharges>0){
          punchX=bl.x; punchY=bl.y; punchT=0.2; sparks(PUNCH,10,bl.x,bl.y);
          punchCharges--; scoreF+=15; sfxPunch(); vibe([0,20,30,20]);
        } else { hurt(); }
        bullets.splice(bi,1);
      }
    }

    // urto laterale: se hai il pugno lo usa in automatico, altrimenti perdi una vita
    if(invT<=0 && hurtT<=0){
      var pb={x:PX+4,y:py+4,w:PW-8,h:PH-6};
      for(var j=0;j<enemies.length;j++){
        var e2=enemies[j], ey2=GROUND_Y-e2.h-(e2.off||0);
        var eb={x:e2.x+2,y:ey2+3,w:e2.w-4,h:e2.h-4};
        if(pb.x<eb.x+eb.w && pb.x+pb.w>eb.x && pb.y<eb.y+eb.h && pb.y+pb.h>eb.y){
          if(punchCharges>0){ punchEnemy(j); }
          else { hurt(); }
          break;
        }
      }
    }
    if(punchT>0) punchT-=dt;

    // particelle
    for(var k=parts.length-1;k>=0;k--){
      var pt=parts[k];
      pt.x+=pt.vx*f; pt.y+=pt.vy*f; pt.vy+=0.02*f; pt.r+=0.1*f; pt.life-=pt.dr*f;
      if(pt.life<=0) parts.splice(k,1);
    }
    // scia planata
    if(gliding){
      glideTrail+=f;
      if(glideTrail>=5){ glideTrail=0;
        parts.push({x:PX+3+(Math.random()*4-2),y:py+PH-2,vx:-(0.6+Math.random()*1.2)-worldSpeed*0.15,vy:(Math.random()*0.6+0.1),r:1.5+Math.random()*2,life:1,dr:0.08+Math.random()*0.05,c:GREEN});
      }
    }
    if(gliding&&!prevGliding) startGlideSfx();
    if(!gliding&&prevGliding) stopGlideSfx();
    prevGliding=gliding;

    // punteggio
    if(grounded){ legTimer+=f*(0.5+worldSpeed*0.12); }
    scoreF+=worldSpeed*f*0.12; score=Math.floor(scoreF);
    var m=Math.floor(score/100);
    if(m>lastMile){ lastMile=m; scorePulse=1; vibe(16); sfxTick(); }
  }

  function hurt(){
    lives--; hurtT=HURT_TIME; hitFlash=7;
    sfxHurt(); vibe([0,35,60,35]);
    sparks(ORANGE,10,PX+PW/2,py+PH/2);
    if(vy>0) vy=-5.2;
    if(lives<=0) die();
  }

  }

  function drawPower(pw){

    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(pw.x,cy,15,0,6.283); ctx.fill();
    ctx.restore();
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(pw.x,cy,9,0,6.283); ctx.fill();

    ctx.beginPath(); ctx.arc(pw.x,cy,6,0,6.283); ctx.fill();
    ctx.fillStyle=col;
    if(pw.kind==="punch"){                 // icona: pugno
      ctx.fillRect(pw.x-4,cy-3,6,6); ctx.fillRect(pw.x+2,cy-1,3,2);
      ctx.fillStyle=INK; ctx.fillRect(pw.x-3,cy-1,4,1);
    }else if(pw.kind==="heart"){           // icona: cuore
      ctx.fillRect(pw.x-3,cy-3,2,1); ctx.fillRect(pw.x+1,cy-3,2,1);
      ctx.fillRect(pw.x-4,cy-2,8,2);
      ctx.fillRect(pw.x-3,cy,6,1);
      ctx.fillRect(pw.x-2,cy+1,4,1);
      ctx.fillRect(pw.x-1,cy+2,2,1);
    }else if(pw.kind==="super"){           // icona: freccia su
      ctx.fillRect(pw.x-1,cy-4,2,8);
      ctx.fillRect(pw.x-3,cy-2,2,2); ctx.fillRect(pw.x+1,cy-2,2,2);
      ctx.fillRect(pw.x-2,cy-4,4,2);
    }else{                                 // icona: stella/!
      ctx.fillRect(pw.x-1,cy-4,2,5); ctx.fillRect(pw.x-1,cy+2,2,2);
    }
  }

  var blink=0;
  function loop(now){
    var dt=now-(loop.last||now); loop.last=now;
    var f=Math.max(0.1,Math.min(2.5,dt/16.67));
    blink+=f;

    if(state==="intro"){
      introT-=f/60;
      if(introT<=6.0 && introT+f/60>6.0) sfxGroan();
      if(introT<=4.2 && introT+f/60>4.2) sfxDouble();
      if(introT<=0) startCountdown();
    }
    if(state==="win"){
      winT-=f/60;
      if(winT<=0){ state="entry"; entryLock=22; entryIdx=0; entryL=[0,0,0]; savedIdx=-1; }
    }
    if(state==="count"){
      countT-=f/60;
      var cn=Math.ceil(countT);
      if(cn!==lastCount){ lastCount=cn; if(cn>0) sfxCount(false); }
      if(countT<=0){ state="play"; startBeat(); sfxCount(true); }
    }
    if(state==="play") update(f);
    if(overLock>0) overLock-=f;
    if(entryLock>0) entryLock-=f;
    if(scorePulse>0) scorePulse-=0.05*f;
    if(hitFlash>0) hitFlash-=f;

    ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
    drawGround();

    if(state==="ready"){
      centerText("FARTFLIP",26,ORANGE,20,"800");
      centerText("CLASSIFICA",40,"rgba(255,255,255,.45)",8,"700");
      if(scores.length===0){
        centerText("nessun punteggio: sei il primo!",58,"rgba(255,255,255,.35)",9,"600");
      }else{
        for(var ri=0;ri<scores.length;ri++){
          drawScoreRow(ri+1,scores[ri],55+ri*12, ri===0?GOLD:"rgba(255,255,255,.75)", ri===0);
        }
      }
      ctx.fillStyle="rgba(255,255,255,.10)"; ctx.fillRect(28,114,W-56,1);
      drawPreview(W/2,158,1.7,blink);
      centerText(SKINS[skin].n,196,SKINS[skin].c,11,"800");
      centerText("\u25c0  rotella / tocca: cambia skin  \u25b6",208,"rgba(255,255,255,.4)",8,"600");
      if(Math.floor(blink/28)%2===0) centerText("TASTO CENTRALE PER GIOCARE",234,WHITE,11,"700");
      centerText("doppio salto = figura + verso \u00b7 tieni = planata",252,"rgba(255,255,255,.3)",8,"600");
      centerText("salta in testa ai nemici \u00b7 raccogli i cuori",264,"rgba(255,255,255,.3)",8,"600");
    } else if(state==="intro"){
      // incipit della storia (10s, si puo' saltare)
      var idx = introT>7.0?0 : introT>4.5?1 : introT>2.0?2 : 3;
      var L = idx===0 ? ["Ahia... non sto","tanto bene."]
            : idx===1 ? ["Devo tornare","a casa. SUBITO."]
            : idx===2 ? ["Mi serve il","GABINETTO!"]
            :           ["Corri,",SKINS[skin].n+"!"];
      ctx.fillStyle="rgba(255,255,255,.05)"; ctx.fillRect(0,0,W,H);
      // fumetto
      var bx=22, by=44, bw=W-44, bh=62;
      ctx.fillStyle="#151517"; ctx.fillRect(bx,by,bw,bh);
      ctx.strokeStyle=ORANGE; ctx.lineWidth=2; ctx.strokeRect(bx,by,bw,bh);
      ctx.fillStyle="#151517"; ctx.fillRect(bx+26,by+bh,12,10);
      ctx.fillStyle=ORANGE; ctx.fillRect(bx+26,by+bh,2,10); ctx.fillRect(bx+36,by+bh,2,8);
      centerText(L[0],by+26,WHITE,13,"700");
      if(L[1]) centerText(L[1],by+46,idx>=2?ORANGE:WHITE,13,"800");
      // personaggio che si tiene la pancia
      drawPreview(W/2,178,2.0,blink);
      if(idx>=2){
        ctx.globalAlpha=0.5+Math.sin(blink*0.35)*0.3;
        ctx.fillStyle=GREEN;
        ctx.beginPath(); ctx.arc(W/2-24,196,5,0,6.283); ctx.fill();
        ctx.beginPath(); ctx.arc(W/2-34,192,3.5,0,6.283); ctx.fill();
        ctx.globalAlpha=1;
      }
      centerText("MISSIONE: arriva al gabinetto",224,GOLD,9,"700");
      centerText(MAX_LEVEL+" livelli ti separano da casa",236,"rgba(255,255,255,.4)",8,"600");
      if(Math.floor(blink/24)%2===0) centerText("tocca per saltare",258,"rgba(255,255,255,.45)",9,"600");
      ctx.fillStyle="rgba(255,255,255,.12)"; ctx.fillRect(30,268,W-60,2);
      ctx.fillStyle=ORANGE; ctx.fillRect(30,268,(W-60)*(1-introT/10),2);
    } else if(state==="win"){
      drawGroundOnlyBg();
      drawToilet(PX+PW+2);
      drawPlayer(PX-6,GROUND_Y-PH,0,0,true,false,false,true,blink,null);
      ctx.fillStyle="rgba(10,10,11,.72)"; ctx.fillRect(0,52,W,150);
      centerText("CE L'HAI FATTA!",84,GOLD,19,"800");
      centerText("sei arrivato al gabinetto",104,"rgba(255,255,255,.7)",10,"700");
      centerText("BONUS  +500",132,SUPER,13,"800");
      centerText("SCORE  "+pad4(score),156,WHITE,15,"800");
      centerText("LIVELLI COMPLETATI: "+MAX_LEVEL,178,"rgba(255,255,255,.5)",9,"700");
      centerText("...ora le iniziali",194,"rgba(255,255,255,.35)",8,"600");
    } else if(state==="count"){
      drawPlayer(PX,GROUND_Y-PH,0,(Math.floor(blink/18)%2),true,false,false,false,blink,null);
      centerText("PRONTO?",96,"rgba(255,255,255,.6)",12,"700");
      var cn2=Math.max(1,Math.ceil(countT));
      var frac=countT-Math.floor(countT);
      ctx.save();
      ctx.globalAlpha=0.45+frac*0.55;
      centerText(String(cn2),168,ORANGE,72,"800");
      ctx.restore();
      centerText("LIVELLO 1 \u00b7 "+SKINS[skin].n,206,SKINS[skin].c,10,"700");
      drawHUD();
    } else if(state==="play"){
      for(var i=0;i<powers.length;i++) drawPower(powers[i]);
      for(var j=0;j<enemies.length;j++) drawEnemy(enemies[j]);
      if(goal) drawToilet(goal.x);
      drawBullets();
      drawPunch();
      if(superFlight){
        ctx.save(); ctx.globalAlpha=0.35+Math.sin(blink*0.3)*0.15;
        ctx.strokeStyle=SUPER; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(PX+PW/2,py+PH/2,18,0,6.283); ctx.stroke();
        ctx.restore();
      }
      var ang = gliding ? 0 : (flipT>0 ? flipDir*(flipT/flipDur)*6.283*flipTurns : 0);
      var blinkOff = (hurtT>0 && Math.floor(blink/3)%2===0);
      drawPlayer(PX,py,ang,(Math.floor(legTimer/1)%2),grounded,gliding,blinkOff,invT>0,blink,gliding?null:trickPose);
      drawParts();
      if(hitFlash>0){ ctx.globalAlpha=hitFlash/7*0.35; ctx.fillStyle="#ff3b30"; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
      drawHUD();
      if(levelT>0){
        ctx.save(); ctx.globalAlpha=Math.min(1,levelT/25);
        centerText("LIVELLO "+level,128,lvlAcc(),24,"800");
        centerText(levelMsg(level),150,"rgba(255,255,255,.75)",10,"700");
        ctx.restore();
      }
    } else if(state==="entry"){
      for(var k=0;k<enemies.length;k++) drawEnemy(enemies[k]);
      drawParts();
      if(deathFlash>0){ ctx.globalAlpha=deathFlash/6*0.6; ctx.fillStyle="#fff"; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; deathFlash-=f; }
      ctx.fillStyle="rgba(10,10,11,.85)"; ctx.fillRect(0,0,W,H);
      centerText("GAME OVER",58,ORANGE,18,"800");
      centerText("SCORE "+pad4(score),80,WHITE,12,"700");
      centerText("INSERISCI LE INIZIALI",106,"rgba(255,255,255,.6)",9,"700");
      var xs=[W/2-44,W/2,W/2+44];
      for(var li=0;li<3;li++){
        var act=(li===entryIdx);
        ctx.font="800 34px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace";
        ctx.textAlign="center"; ctx.textBaseline="alphabetic";
        ctx.fillStyle= act ? ORANGE : "rgba(255,255,255,.85)";
        ctx.fillText(AB[entryL[li]],xs[li],166);
        ctx.fillStyle= act ? ORANGE : "rgba(255,255,255,.22)";
        ctx.fillRect(xs[li]-14,174,28,3);
        if(act && Math.floor(blink/16)%2===0){
          ctx.fillStyle=ORANGE;
          ctx.font="700 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace";
          ctx.fillText("\u25b2",xs[li],126);
          ctx.fillText("\u25bc",xs[li],194);
        }
      }
      ctx.textAlign="left";
      centerText("tocca alto/basso: cambia lettera",216,"rgba(255,255,255,.45)",8,"600");
      centerText("tocca al centro: conferma",228,"rgba(255,255,255,.45)",8,"600");
      centerText("(sull'R1: rotella + tasto laterale)",240,"rgba(255,255,255,.35)",8,"600");
    } else {
      for(var k2=0;k2<enemies.length;k2++) drawEnemy(enemies[k2]);
      drawPlayer(PX,py,0,0,true,false,false,false,blink,null);
      drawParts();
      ctx.fillStyle="rgba(10,10,11,.75)"; ctx.fillRect(0,50,W,186);
      centerText("GAME OVER",74,ORANGE,18,"800");
      centerText("SCORE "+pad4(score)+"   BEST "+pad4(best),94,WHITE,10,"700");
      centerText("CLASSIFICA",114,"rgba(255,255,255,.5)",9,"700");
      for(var si=0;si<scores.length;si++){
        drawScoreRow(si+1,scores[si],133+si*16, si===savedIdx?GOLD:"rgba(255,255,255,.8)", si===savedIdx);
      }
      if(overLock<=0 && Math.floor(blink/28)%2===0) centerText("TAP PER RIPROVARE",248,WHITE,12,"700");
    }
    requestAnimationFrame(loop);
  }

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
