<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FARTFLIP">
<meta name="theme-color" content="#04040a">
<title>FARTFLIP HD</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;user-select:none;}
  html,body{width:100%;height:100vh;height:100dvh;background:#04040a;overflow:hidden;overscroll-behavior:none;}
  body{cursor:pointer;touch-action:none;}
  canvas{position:fixed;inset:0;display:block;background:#04040a;}
</style>
</head>
<body>
<canvas id="c" width="240" height="282"></canvas>
<script>
(function(){
  "use strict";
  var W=240,H=282;
  var cv=document.getElementById("c"),ctx=cv.getContext("2d");
  ctx.imageSmoothingEnabled=true;
  ctx.lineCap="round"; ctx.lineJoin="round";

  // ================= MOTORE HD =================
  // Il mondo di gioco resta 240x282 unita' (fisica identica alla versione R1).
  // Qui si disegna a risoluzione nativa: canvas a schermo intero con devicePixelRatio,
  // trasformazione mondo->schermo (S, OX, OY) e sfondo parallasse full-bleed.
  var DPR=1, cssW=W, cssH=H, S=1, OX=0, OY=0, horizonY=H;
  var skyC=null, farC=null, midC=null, nearC=null, groundC=null, vigC=null;
  var twk=[], streaks=[], scrFar=0, scrMid=0, scrNear=0;
  var hdWasG=true, hdLandT=0, hdFaceMood="norm", hdCyc=0, winPoop=false;
  var comboN=0, comboT=0, comboPulse=0, nearCd=0, slowMoT=0, flashT=0, kfreezeT=0, shakeT=0, rings=[];
  var grindFx=0, lvl10T=0, skateFx=0;
  var jetTgt=JET_Y, jetHintT=0, fireHintT=0, fireHintOff=false, fireShots=0;
  try{ fireHintOff=(localStorage.getItem("fartflip_firehint")==="1"); }catch(e){}
  // ---- FARTFLIP LAB (developer mode): override di pose, colori, audio ----
  var POSE_OVR={}, LVL_OVR=null, DEV_BPM_OFF=0, DEV_SK=null, devPose=null, devZoom=6;
  function applyMod(m){
    m=m||{};
    POSE_OVR=(m.poses&&typeof m.poses==="object")?m.poses:{};
    LVL_OVR=(m.colors&&m.colors.slice)?m.colors.slice(0,10):null;
    DEV_BPM_OFF=Math.max(-40,Math.min(40,(m.bpmOff|0)||0));
    DEV_SK=(m.sk&&m.sk.slice)?m.sk.slice(0,6):null;
    SFX_OVR=(m.sfx&&typeof m.sfx==="object")?m.sfx:{};
    var mm=m.menu||{};
    MENU.mode=(mm.mode==="loop"||mm.mode==="smp")?mm.mode:"off";
    MENU.vol=(mm.vol===undefined)?0.5:Math.max(0,Math.min(1,+mm.vol||0));
    MENU.bpm=Math.max(60,Math.min(160,(mm.bpm|0)||96));
    MENU.smp=(typeof mm.smp==="string")?mm.smp:null;
    stopMenuMusic();
    if(m.env&&typeof m.env==="object") setEnvFrom(m.env); else resetEnv();
  }
  try{ var MOD0=JSON.parse(localStorage.getItem("fartflip_mod")||"null"); if(MOD0) applyMod(MOD0); }catch(e){}
  function devPoseOvr(pose,glid,gnd,isk){
    var key = pose ? pose : (glid ? (isk?"glide_skate":"glide") : (!gnd ? "air" : null));
    if(!key) return null;
    var A=POSE_OVR[String(skin)], B=POSE_OVR["*"];
    return (A && A[key]) || (B && B[key]) || null;
  }
  var stSquash=0, stNear=0, stCombo=0, stChain=0, newUnl=[];
  var lockShake=0, optSel=0, vibOn=1;
  try{ vibOn=(localStorage.getItem("fartflip_vib")==="0")?0:1; }catch(e){}
  var winMash=0, winMashT=0, winMashDone=false, winTX=0, winSeatY=0;
  var WIN_GATE=6.35, WIN_MASH_N=16, MASH_DECAY=2.2;   // la barra cala se smetti di toccare
  var tpLevel=8, tpT=0, tpDone=false, tpGot=false;   // rotolo di carta igienica: +300 a fine partita
  var LVL10_TIME=30;                 // ultimo livello: durata sempre uguale
  var introPh=-1, introTyped=0, touchY0=0, diveDone=false, diveBuf=0, apexDing=false, readyIdle=0;

  function mkCanvas(w,h){ var c=document.createElement("canvas"); c.width=Math.max(1,Math.round(w)); c.height=Math.max(1,Math.round(h)); return c; }
  function hexA(h,a){ var n=parseInt(h.slice(1),16); return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")"; }
  function rrp(g,x,y,w,h,r){
    if(r>w/2) r=w/2; if(r>h/2) r=h/2; if(r<0) r=0;
    g.beginPath();
    g.moveTo(x+r,y);
    g.lineTo(x+w-r,y); g.quadraticCurveTo(x+w,y,x+w,y+r);
    g.lineTo(x+w,y+h-r); g.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    g.lineTo(x+r,y+h); g.quadraticCurveTo(x,y+h,x,y+h-r);
    g.lineTo(x,y+r); g.quadraticCurveTo(x,y,x+r,y);
    g.closePath();
  }
  function rrf(x,y,w,h,r){ rrp(ctx,x,y,w,h,r); ctx.fill(); }
  function limb(x0,y0,x1,y1,wd,col){
    ctx.strokeStyle=col; ctx.lineWidth=wd;
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
  }
  function limb2(x0,y0,xm,ym,x1,y1,wd,col){
    ctx.strokeStyle=col; ctx.lineWidth=wd;
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.quadraticCurveTo(xm,ym,x1,y1); ctx.stroke();
  }

  // skyline procedurale, deterministica, con wrap perfetto per il loop
  function makeSkyline(seed,tileW,hMin,hMax,col,winCol,winP,coolP){
    var c=mkCanvas(tileW,hMax+34), g=c.getContext("2d"), r=mulberry32(seed);
    function bld(bx){
      var bw=26+r()*72, bh=hMin+r()*(hMax-hMin), by=c.height-bh;
      g.fillStyle=col; g.fillRect(bx,by,bw,bh);
      if(r()<0.30){ var aw=2+r()*2; g.fillRect(bx+bw*0.5-aw/2, by-8-r()*18, aw, 10+r()*16); }
      if(r()<0.35){ var rw=8+r()*14; g.fillRect(bx+4+r()*(bw-rw-8), by-5-r()*4, rw, 8); }
      if(winP>0){
        var cw=4, ch=5, gpx=8, gpy=11;
        for(var wy=by+8; wy<c.height-10; wy+=gpy){
          for(var wx=bx+5; wx<bx+bw-6; wx+=gpx){
            if(r()<winP){
              g.fillStyle=(r()<coolP)?"rgba(130,220,255,.55)":winCol;
              g.globalAlpha=0.5+r()*0.5;
              g.fillRect(wx,wy,cw,ch);
              g.globalAlpha=1;
            }
          }
        }
      }
      return bw;
    }
    var x=0;
    while(x<tileW){
      var bw=bld(x);
      if(x+bw>tileW) bld(x-tileW);          // wrap: la stessa palazzina riparte da sinistra
      x+=bw+Math.floor(r()*3);
    }
    return c;
  }

  function buildLayers(){
    var gH=Math.max(2,cssH-horizonY);
    // cielo: crepuscolo, sole basso, stelle
    skyC=mkCanvas(cssW,horizonY+2);
    var g=skyC.getContext("2d");
    var gr=g.createLinearGradient(0,0,0,horizonY);
    gr.addColorStop(0,ENV.sky[0]); gr.addColorStop(0.40,ENV.sky[1]);
    gr.addColorStop(0.70,ENV.sky[2]); gr.addColorStop(0.90,ENV.sky[3]);
    gr.addColorStop(1,ENV.sky[4]);
    g.fillStyle=gr; g.fillRect(0,0,cssW,horizonY+2);
    var sunX=cssW*Math.max(0.05,Math.min(0.95,+ENV.sunX||0.66)), sunY=horizonY*0.97, glowR=Math.max(80,horizonY*0.9);
    if(ENV.sunOn){
      var GR9=hexRGB(ENV.glow), SR9=hexRGB(ENV.sun), SL9=mixRGB(ENV.sun,"#ffffff",0.55);
      var rg=g.createRadialGradient(sunX,sunY,0,sunX,sunY,glowR);
      rg.addColorStop(0,"rgba("+GR9+",.50)"); rg.addColorStop(0.28,"rgba("+GR9+",.24)");
      rg.addColorStop(0.62,"rgba(140,40,60,.09)"); rg.addColorStop(1,"rgba(0,0,0,0)");
      g.fillStyle=rg; g.fillRect(0,0,cssW,horizonY+2);
      var dR=Math.max(18,horizonY*0.15);
      var dg=g.createRadialGradient(sunX,sunY,dR*0.1,sunX,sunY,dR);
      dg.addColorStop(0,"rgba("+SL9+",.95)"); dg.addColorStop(0.55,"rgba("+SR9+",.85)");
      dg.addColorStop(1,"rgba("+SR9+",0)");
      g.fillStyle=dg; g.beginPath(); g.arc(sunX,sunY,dR,0,6.283); g.fill();
    }
    var sr=mulberry32(99), ns=Math.round(cssW/8*Math.max(0,Math.min(2,+ENV.stars)));
    for(var i=0;i<ns;i++){
      var sx2=sr()*cssW, sy2=sr()*horizonY*0.62;
      if(Math.abs(sx2-sunX)<glowR*0.5 && sy2>horizonY*0.5) continue;
      g.globalAlpha=0.18+sr()*0.5;
      g.fillStyle=(sr()<0.2)?"#bcd8ff":"#ffffff";
      g.fillRect(sx2,sy2,(sr()<0.25?1.8:1.1),(sr()<0.25?1.8:1.1));
    }
    g.globalAlpha=1;
    twk=[]; var tr=mulberry32(7);
    for(var t=0;t<16;t++) twk.push({x:tr()*cssW, y:tr()*horizonY*0.55, p:tr()*6.28});
    // skyline: lontana / media / vicina
    var tw=Math.max(cssW,960);
    farC =makeSkyline(20260718, tw, horizonY*0.16, horizonY*0.50, ENV.bldFar, "", 0, 0);
    midC =makeSkyline(31337,    tw, horizonY*0.12, horizonY*0.36, ENV.bldMid, "rgba("+hexRGB(ENV.win)+",.35)", Math.max(0,Math.min(0.3,+ENV.winP*0.5)), 0.10);
    nearC=makeSkyline(4242,     tw, horizonY*0.08, horizonY*0.24, ENV.bldNear, "rgba("+hexRGB(ENV.win)+",.85)", Math.max(0,Math.min(0.5,+ENV.winP)), 0.06);
    // asfalto bagnato
    groundC=mkCanvas(cssW,gH);
    var q=groundC.getContext("2d");
    var qg=q.createLinearGradient(0,0,0,gH);
    qg.addColorStop(0,ENV.ground[0]); qg.addColorStop(0.16,ENV.ground[1]);
    qg.addColorStop(0.55,ENV.ground[2]); qg.addColorStop(1,ENV.ground[3]);
    q.fillStyle=qg; q.fillRect(0,0,cssW,gH);
    q.fillStyle="rgba("+hexRGB(ENV.glow)+",.10)"; q.fillRect(0,0,cssW,2);
    var nr=mulberry32(555), nd=Math.round(cssW*gH/900);
    for(var d=0;d<nd;d++){
      q.globalAlpha=0.03+nr()*0.05;
      q.fillStyle=(nr()<0.5)?"#ffffff":"#000000";
      q.fillRect(nr()*cssW, nr()*gH, 1+nr()*2, 1);
    }
    q.globalAlpha=1;
    // riflessi verticali (luci della citta' sull'asfalto)
    streaks=[]; var kr=mulberry32(2024);
    for(var s2=0;s2<12;s2++){
      streaks.push({x:kr()*tw, w:5+kr()*14, a:0.04+kr()*0.06,
                    c:(kr()<0.62)?"255,160,80":(kr()<0.85?"255,255,255":"130,220,255")});
    }
    // vignetta + oscuramento ai lati della colonna di gioco
    vigC=mkCanvas(cssW,cssH);
    var v=vigC.getContext("2d");
    var vg=v.createRadialGradient(cssW/2,cssH*0.46,Math.min(cssW,cssH)*0.42,cssW/2,cssH/2,Math.max(cssW,cssH)*0.72);
    vg.addColorStop(0,"rgba(0,0,0,0)"); vg.addColorStop(1,"rgba(0,0,0,.42)");
    v.fillStyle=vg; v.fillRect(0,0,cssW,cssH);
    if(OX>8){
      var lg=v.createLinearGradient(0,0,OX,0);
      lg.addColorStop(0,"rgba(0,0,0,.34)"); lg.addColorStop(1,"rgba(0,0,0,0)");
      v.fillStyle=lg; v.fillRect(0,0,OX,cssH);
      var rg2=v.createLinearGradient(cssW,0,cssW-OX,0);
      rg2.addColorStop(0,"rgba(0,0,0,.34)"); rg2.addColorStop(1,"rgba(0,0,0,0)");
      v.fillStyle=rg2; v.fillRect(cssW-OX,0,OX,cssH);
    }
  }

  function fitScreen(){
    cssW=window.innerWidth||960; cssH=window.innerHeight||540;
    DPR=Math.min(window.devicePixelRatio||1,2);
    if(cssW*DPR>3900) DPR=3900/cssW;
    if(cssH*DPR>3900) DPR=3900/cssH;
    cv.width=Math.round(cssW*DPR); cv.height=Math.round(cssH*DPR);
    cv.style.width=cssW+"px"; cv.style.height=cssH+"px";
    S=Math.min(cssW/W, cssH/H);
    OX=(cssW-W*S)/2; OY=(cssH-H*S)/2;
    horizonY=OY+GROUND_Y*S;
    buildLayers();
  }
  try{
    window.addEventListener("resize",fitScreen);
    window.addEventListener("orientationchange",fitScreen);
  }catch(e){}

  // velocita' visiva dello sfondo (solo estetica: la logica non cambia)
  function vspd(){
    if(state==="play") return (paused||freezeT>0||kfreezeT>0)?0:worldSpeed;
    if(state==="tutorial") return tutApexHold>0?0:2.4;
    if(state==="ready"||state==="mode"||state==="diff"||state==="intro"||state==="count") return 0.55;
    return 0;
  }
  function tileDraw(c,off,y){
    var tw=c.width, o=((off%tw)+tw)%tw;
    ctx.drawImage(c,-o,y);
    ctx.drawImage(c,tw-o,y);
  }
  function drawBackdrop(f){
    var v=vspd()*f*S;
    scrFar+=v*0.045; scrMid+=v*0.12; scrNear+=v*0.28;
    var pul=(state==="play" && invT>0 && !paused)?Math.min(1,invT/1.5):0;
    var pw=pul*(0.5+0.5*Math.sin(blink*0.28));
    if(skyC) ctx.drawImage(skyC,0,0);
    for(var i=0;i<twk.length;i++){
      var st=twk[i], a=0.25+0.30*Math.sin(blink*0.06+st.p)+pul*0.25;
      if(a>0){ ctx.globalAlpha=a; ctx.fillStyle="#fff"; ctx.fillRect(st.x,st.y,1.4,1.4); }
    }
    ctx.globalAlpha=1;
    if(farC) tileDraw(farC,scrFar,horizonY-farC.height - pul*2.5*Math.abs(Math.sin(blink*0.14)));
    ctx.fillStyle="rgba(110,80,160,.06)"; ctx.fillRect(0,horizonY-(midC?midC.height:0)-14,cssW,16);
    if(midC) tileDraw(midC,scrMid,horizonY-midC.height - pul*4.5*Math.abs(Math.sin(blink*0.14+1.0)));
    ctx.fillStyle="rgba(255,120,50,.05)"; ctx.fillRect(0,horizonY-(nearC?nearC.height:0)-8,cssW,10);
    if(nearC) tileDraw(nearC,scrNear,horizonY-nearC.height - pul*6.5*Math.abs(Math.sin(blink*0.14+2.0)));
    if(groundC) ctx.drawImage(groundC,0,horizonY);
    // bagliore del sole sull'asfalto
    var gH=cssH-horizonY, sunX=cssW*Math.max(0.05,Math.min(0.95,+ENV.sunX||0.66));
    if(ENV.sunOn){
      var GB9=hexRGB(ENV.glow);
      var sg=ctx.createLinearGradient(0,horizonY,0,cssH);
      var sa=0.10+0.03*Math.sin(blink*0.03);
      sg.addColorStop(0,"rgba("+GB9+","+sa.toFixed(3)+")"); sg.addColorStop(1,"rgba("+GB9+",0)");
      ctx.fillStyle=sg; ctx.fillRect(sunX-cssW*0.26,horizonY,cssW*0.52,gH);
    }
    // riflessi che scorrono con la skyline vicina
    var tw=(nearC?nearC.width:cssW);
    for(var s2=0;s2<streaks.length;s2++){
      var st2=streaks[s2];
      var sx3=((st2.x-scrNear)%tw+tw)%tw;
      var rg3=ctx.createLinearGradient(0,horizonY,0,horizonY+gH*0.85);
      rg3.addColorStop(0,"rgba("+st2.c+","+(st2.a*(1+pw*1.4)).toFixed(3)+")");
      rg3.addColorStop(1,"rgba("+st2.c+",0)");
      ctx.fillStyle=rg3; ctx.fillRect(sx3,horizonY,st2.w,gH*0.85);
      if(sx3+st2.w>tw) ctx.fillRect(sx3-tw,horizonY,st2.w,gH*0.85);
    }
    if(pul>0){
      ctx.fillStyle="hsla("+Math.floor((blink*5)%360)+",95%,62%,"+(0.045+0.055*pw).toFixed(3)+")";
      ctx.fillRect(0,0,cssW,cssH);
      ctx.fillStyle="rgba(255,255,255,"+(0.035*pw).toFixed(3)+")";
      ctx.fillRect(0,horizonY-1.5,cssW,3);
    }
  }
  function animSpd(){
    if(state==="play") return (paused||freezeT>0||kfreezeT>0)?0:worldSpeed;
    if(state==="win") return 2.6;
    if(state==="tutorial") return tutApexHold>0?0:2.4;
    return 3;
  }
  function hdFrameBegin(f){
    hdCyc += (0.10 + animSpd()*0.045)*f;   // fase continua: niente salti quando cambia la velocita'
    ctx.setTransform(DPR,0,0,DPR,0,0);
    drawBackdrop(f);
    ctx.save();
    ctx.translate(OX,OY); ctx.scale(S,S);
    if(shakeT>0){ shakeT-=f/60; var skk=Math.max(0,shakeT)*14; ctx.translate((Math.random()-0.5)*skk,(Math.random()-0.5)*skk*0.7); }
    if(flashT>0) flashT-=f/60;
    ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  }
  function hdFrameEnd(){
    ctx.restore();
    if(flashT>0){ ctx.fillStyle="rgba(255,255,255,"+Math.min(0.5,flashT*2.2).toFixed(3)+")"; ctx.fillRect(0,0,cssW,cssH); }
    if(vigC) ctx.drawImage(vigC,0,0);
  }
  // ================= FINE MOTORE HD =================

  // palette (stile Rabbit: nero + arancione, minimal)
  var BG="#0a0a0b", ORANGE="#FE5000", ORANGE_DK="#b83a00", WHITE="#f2f2f2",
      FACE="#f4eee4", GREY="#c9c9cf", GREY_DK="#83838a", GREEN="#a7d18a", INK="#0a0a0b",
      GOLD="#FFC24A", PUNCH="#5AC8FF", SUPER="#8BE05A", HEART="#FF5A6E", JET="#57F2C9";

  var SKINS=[
    {n:"PAZZO", c:"#FE5000", d:"#B83A00", f:"#F4EEE4", hair:"spiky", eyes:"crazy",  mouth:"grin"},
    {n:"LUNA",  c:"#8B5CF6", d:"#5B32B0", f:"#EFE6FB", hair:"flat",  eyes:"sleepy", mouth:"smirk"},
    {n:"MENTA", c:"#2FD37E", d:"#179153", f:"#E7FAF0", hair:"tuft",  eyes:"wide",   mouth:"tongue"},
    {n:"BRACE", c:"#C2261E", d:"#660D08", f:"#FFD9C9", hair:"mohawk", eyes:"angry", mouth:"fang",     puff:"#FF7A18", boot:"boots"},
    {n:"GELO",  c:"#4FC3F7", d:"#12547F", f:"#EAF9FF", hair:"horns",  eyes:"visor", mouth:"flatline", puff:"#8FE9FF", boot:"skates", skate:1},
    {n:"ORO",   c:"#FFC24A", d:"#9A6606", f:"#FFF6E0", hair:"crown",  eyes:"wide",  mouth:"grin",     puff:"#FFDA7A", boot:"skate", ride:1}
  ];
  // ---- sblocchi: le ultime tre skin si conquistano giocando ----
  var UNL={l5:0,c10:0,sq:0};
  try{ var uj=JSON.parse(localStorage.getItem("fartflip_unl")||"null"); if(uj&&typeof uj==="object"){ UNL.l5=uj.l5||0; UNL.c10=uj.c10||0; UNL.sq=uj.sq||0; } }catch(e){}
  function saveUnl(){ try{ localStorage.setItem("fartflip_unl",JSON.stringify(UNL)); }catch(e){} }
  function skinLocked(i){
    if(i<3) return false;
    if(i===3) return !UNL.l5;
    if(i===4) return !UNL.c10;
    return UNL.sq<50;
  }
  function unlockGoal(i){
    return i===3 ? "arriva al livello 5"
         : i===4 ? "catena di grind x10"
         : "schiaccia 50 nemici ("+Math.min(UNL.sq,50)+"/50)";
  }
  function unlockedCount(){ var k=0; for(var i=0;i<SKINS.length;i++) if(!skinLocked(i)) k++; return k; }
  function nextLockedIdx(){ for(var i=3;i<SKINS.length;i++) if(skinLocked(i)) return i; return -1; }
  var DIFFS=[
    {n:"FACILE",    sp:0,   gap:1.15, pads:false, d:"per iniziare"},
    {n:"MEDIA",     sp:0.6, gap:0.80, pads:false, d:"piu' veloce \u00b7 punti x2"},
    {n:"DIFFICILE", sp:1.2, gap:0.66, pads:true,  d:"pedane di scatto \u00b7 punti x3"}
  ];
  var diff=0;
  try{ var df0=parseInt(localStorage.getItem("fartflip_diff")||"0",10); if(!isNaN(df0)&&df0>=0&&df0<3) diff=df0; }catch(e){}
  function DM(){ if(mode==="sfida") return 1; return diff===2?3:diff===1?2:1; }   // moltiplicatore punti (sfida sempre x1)

  // ---- controller Xbox / gamepad ----
  var padPrev={}, padOn=false, padHold=false, padRumbleT=0;

  function padRumble(ms,strong){
    try{
      var gp=(navigator.getGamepads?navigator.getGamepads():[])[padIdx];
      if(gp && gp.vibrationActuator) gp.vibrationActuator.playEffect("dual-rumble",
        {duration:ms||60, strongMagnitude:strong||0.4, weakMagnitude:0.25});

  }
  var padIdx=0;
  function pollPad(){
    var gps=[]; try{ gps=navigator.getGamepads?navigator.getGamepads():[]; }catch(e){ return; }
    var gp=null;
    for(var i=0;i<gps.length;i++){ if(gps[i] && gps[i].connected){ gp=gps[i]; padIdx=i; break; } }
    padOn=!!gp;
    if(!gp){ padHold=false; return; }
    var bt=gp.buttons||[], ax=gp.axes||[];
    function B(i){ return !!(bt[i] && (bt[i].pressed || bt[i].value>0.5)); }
    var A=B(0), Bb=B(1), START=B(9)||B(8), LB=B(4), RB=B(5);
    var UP   = B(12) || (ax[1]!==undefined && ax[1]<-0.55);
    var DOWN = B(13) || (ax[1]!==undefined && ax[1]>0.55);
    var JUMP = A || Bb || UP || B(7) || B(6);
    padHold = A || Bb;

    var LEFT  = B(14) || (ax[0]!==undefined && ax[0]<-0.55);
    var RIGHT = B(15) || (ax[0]!==undefined && ax[0]>0.55);
    var eJump=padEdge("jump",JUMP), eA=padEdge("a",A), eStart=padEdge("start",START);
    var eUp=padEdge("up",UP), eDown=padEdge("down",DOWN);
    var eLeft=padEdge("left",LEFT), eRight=padEdge("right",RIGHT), eB=padEdge("b",Bb);

    if(state==="ready"){
      if(readyIdle>=7 && (eA||eStart||eB||eUp||eDown||eLeft||eRight)){ readyIdle=0; sfxTick(); return; }
      if(eA||eStart||eB||eUp||eDown||eLeft||eRight||eJump) readyIdle=0;   // pad attivo: attesa azzerata
      if(eUp||eRight){ setSkin(skin+1); sfxTick(); }
      if(eDown||eLeft){ setSkin(skin-1); sfxTick(); }
      if(eA||eStart){ tryPlay(); }
      if(eB){ optSel=0; state="opts"; sfxTick(); }
    } else if(state==="mode"){
      if(eUp||eDown||eLeft||eRight){ modeSel=1-modeSel; sfxTick(); }
      if(eB){ state="ready"; sfxTick(); }
      else if(eA||eStart){ if(modeSel===0){ mode="arcade"; state="diff"; } else startSfida(); }
    } else if(state==="diff"){
      if(eUp){ setDiff(diff-1); sfxTick(); }

      else if(eA||eStart){ mode="arcade"; startIntro(); }
    } else if(state==="intro"){
      if(eB){ state=(mode==="sfida")?"mode":"diff"; sfxTick(); }
      else if(eA||eStart) startTutorial();
    } else if(state==="opts"){
      if(eUp){ optSel=(optSel+2)%3; sfxTick(); }
      if(eDown){ optSel=(optSel+1)%3; sfxTick(); }
      if(eB){ state="ready"; readyIdle=0; sfxTick(); }

    } else if(state==="play"){
      if(eStart) togglePause();

    }
  }

    if(state==="mode"){
      if(e.key==="ArrowUp"||e.key==="ArrowDown"){ e.preventDefault(); modeSel=1-modeSel; sfxTick(); return; }
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); if(modeSel===0){ mode="arcade"; state="diff"; } else startSfida(); return; }
      return;
    }
    if(state==="diff"){
      if(e.key==="ArrowUp"){ e.preventDefault(); setDiff(diff-1); sfxTick(); return; }
      if(e.key==="ArrowDown"){ e.preventDefault(); setDiff(diff+1); sfxTick(); return; }
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); startIntro(); return; }
      return;
    }
    if(state==="opts"){
      e.preventDefault();
      if(e.key==="ArrowUp"){ optSel=(optSel+2)%3; sfxTick(); }
      else if(e.key==="ArrowDown"){ optSel=(optSel+1)%3; sfxTick(); }
      else if(e.key==="Escape"||e.key==="Backspace"){ state="ready"; readyIdle=0; sfxTick(); }
      else if(e.key==="Enter"||e.key===" "||e.key==="ArrowLeft"||e.key==="ArrowRight"){
        if(optSel===0) setVol(volIdx+(e.key==="ArrowLeft"?-1:1));
        else if(optSel===1) setVib(vibOn?0:1);
        else { state="ready"; readyIdle=0; }
        sfxTick();
      }
      return;
    }
    if(state==="win"){ e.preventDefault(); winTap(); return; }
    if(state==="intro"){ e.preventDefault(); startTutorial(); return; }
    if(state==="tutorial"){ if(e.key==="Escape"){ stopJetSfx(); startCountdown(); } return; }
    if(state==="entry"){
      if(e.key==="ArrowUp"){ e.preventDefault(); entryChange(1); }
      else if(e.key==="ArrowDown"){ e.preventDefault(); entryChange(-1); }
      else if(e.key==="ArrowLeft"){ e.preventDefault(); if(entryIdx>0){ entryIdx--; sfxTick(); } }
      else if(e.key==="ArrowRight"){ e.preventDefault(); if(entryIdx<2){ entryIdx++; sfxTick(); } }
      else if(e.key==="Backspace"){ e.preventDefault(); if(entryIdx>0){ entryIdx--; sfxTick(); } }
      else if(e.key==="Enter"||e.key===" "){ e.preventDefault(); entryConfirm(); }
      else if(/^[a-zA-Z]$/.test(e.key)){ entryL[entryIdx]=AB.indexOf(e.key.toUpperCase()); entryConfirm(); }
      return;
    }
    if(state==="play" && !paused && e.key==="ArrowDown"){ e.preventDefault(); dive(); return; }
    if(state==="play" && !paused && jetT>0 && e.key==="ArrowUp"){ e.preventDefault(); jetMove(-1); return; }
    if(e.key==="m"||e.key==="M"){ e.preventDefault(); setVol(volIdx+1); sfxTick(); return; }
    if(e.key==="p"||e.key==="P"||e.key==="Escape"){ e.preventDefault(); togglePause(); return; }
    if(state==="play" && paused){ if(e.key===" "||e.key==="Enter"){ e.preventDefault(); togglePause(); } return; }
    if(e.key==="ArrowUp"||e.key===" "||e.key==="Enter"){ if(!e.repeat){e.preventDefault(); holding=true; onTap();} }
  });
  document.addEventListener("keyup",function(e){
    if(e.key==="ArrowUp"||e.key===" "||e.key==="Enter"){ holding=false; }
  });

  function spawnFromTrack(e){
    if(e.t==="power"){ powers.push({x:W+10, y:e.y, t:0, got:false, kind:e.k}); return; }
    if(e.t==="heart"){ powers.push({x:W+10, y:e.y, t:0, got:false, kind:"heart"}); return; }
    if(e.t==="train"){
      var id=++trainId, x=W+8, wsum=0;
      for(var i=0;i<e.n;i++){
        var w=22+((i*7+e.d)%8);
        enemies.push({x:x, w:w, h:e.h, ph:0, pt:0, extra:0, ridden:false, passed:false,
                      type:"base", off:0, vy:0, dash:0, jt:99999, fire:99999,
                      train:id, tfirst:(i===0), tlast:(i===e.n-1)});
        x+=w; wsum+=w;
      }
      var nfly=(e.fly===undefined?0:e.fly);
      for(var k=0;k<nfly;k++){
        enemies.push({x:W+18+wsum*(0.42+k*0.34), w:16, h:13, ph:0, pt:0, extra:0, ridden:false, passed:false,
                      type:"fly", off:34+((e.d+k*37)%16), vy:0, dash:0, jt:99999, fire:99999});
      }
      return;
    }
    enemies.push({x:W+6, w:e.w, h:e.h, ph:0, pt:0, extra:0, ridden:false, passed:false, spike:!!e.spike,
                  type:e.t, off:0, vy:0, dash:0, jt:26+((e.d)%40), fire:16+((e.d)%26)});
  }
  function spawnTrain(){
    var n = 3+Math.floor(Math.random()*3);              // 3..5 nemici attaccati
    if(Math.random()<0.38) n += 2+Math.floor(Math.random()*3);   // ogni tanto una fila lunghissima
    var h = [16,20,24][Math.floor(Math.random()*3)];    // stessa altezza = piattaforma continua
    var id = ++trainId;
    var x = W+Math.random()*14;
    for(var i=0;i<n;i++){
      var w = 24+Math.floor(Math.random()*12);
      enemies.push({x:x, w:w, h:h, ph:0, pt:0, extra:0, ridden:false, passed:false,
                    type:"base", off:0, vy:0, dash:0, jt:99999, fire:99999,
                    train:id, tfirst:(i===0), tlast:(i===n-1)});
      x += w;                                           // nessuno spazio: sono attaccati
    }
    // sopra la fila a volte arrivano dei volanti: mentre cavalchi devi saltarli
    var span = x-(W+7);
    var nf = (Math.random() < (level>=6?0.6:0.45)*(diff===0?0.7:1)) ? (level>=6 && Math.random()<(diff===0?0.30:0.45) ? 2 : 1) : 0;
    for(var k=0;k<nf;k++){
      enemies.push({x:W+18+span*(0.42+k*0.34), w:15+Math.floor(Math.random()*6), h:13,
                    ph:0, pt:0, extra:0, ridden:false, passed:false, type:"fly",
                    off:34+Math.random()*16, vy:0, dash:0, jt:99999, fire:99999});
    }
    distNext = (120 + worldSpeed*9 + Math.random()*70) * DIFFS[diff].gap;
  }
  function spikeChance(){
    var b = level===1 ? 0.08 : level===2 ? 0.13 : level===3 ? 0.19 : level===4 ? 0.25 :
            level===5 ? 0.30 : level===6 ? 0.36 : level===7 ? 0.43 : level===8 ? 0.50 :
            level===9 ? 0.56 : 0.62;
    return Math.min(0.75, b*(diff===0?0.72:1) + (diff===1?0.08:diff===2?0.16:0));
  }
  function spawn(){
    var trP=(level<=3)?(diff===0?0.16:0.22):(diff===0?0.30:0.42);   // un assaggio gia' dal livello 2
    if(level>=2 && Math.random()<trP){ spawnTrain(); return; }
    var r=Math.random(), t;
    if(level<=1) t="base";
    else if(level===2) t=(r<0.7?"wide":"base");
    else if(level===3) t=(r<0.55?"hop":(r<0.8?"wide":"base"));
    else if(level===4) t=(r<0.4?"hop":(r<0.7?"wide":"base"));
    else if(level<=6)  t=(r<0.45?"leap":(r<0.65?"hop":(r<0.85?"wide":"base")));
    else               t=(r<0.28?"shoot":(r<0.58?"leap":(r<0.74?"hop":(r<0.9?"wide":"base"))));
    var e={x:W+Math.random()*18, ph:0, pt:0, extra:Math.random()*0.6, ridden:false, passed:false,
           type:t, off:0, vy:0, dash:0, jt:30+Math.random()*60, fire:16+Math.random()*26};
    if(t==="wide"){ e.h=[16,20,26][Math.floor(Math.random()*3)]; e.w=30+Math.floor(Math.random()*19); }
    else if(t==="hop"){ e.h=16+Math.floor(Math.random()*8); e.w=15+Math.floor(Math.random()*8); }
    else if(t==="leap"){ e.h=18+Math.floor(Math.random()*7); e.w=16+Math.floor(Math.random()*7); }
    else if(t==="shoot"){ e.h=24+Math.floor(Math.random()*7); e.w=17+Math.floor(Math.random()*6); }
    else { var q=Math.random(); e.h=q<0.55?18:q<0.85?24:30; e.w=15+Math.floor(Math.random()*8); }
    if(t!=="fly" && t!=="shoot") e.spike = (Math.random()<spikeChance());
    enemies.push(e);
    distNext = (80 + e.w + worldSpeed*8 + Math.random()*90) * DIFFS[diff].gap;
    if(DIFFS[diff].pads && Math.random()<0.32) pads.push({x:W+34+Math.random()*40, used:false});
  }
  function spawnPower(){
    var r=Math.random();
    var kind = r<0.2 ? "inv" : r<0.47 ? "punch" : r<0.74 ? "super" : "jet";   // invincibilita' 1 su 5
    powers.push({x:W+10, y:132+Math.random()*30, t:0, got:false, kind:kind}); // altezza media, prendibile
  }
  function spawnHeart(){
    powers.push({x:W+10, y:140+Math.random()*26, t:0, got:false, kind:"heart"});
  }

  function update(f){
    var dt=f/60;
    var baseSpeed = (mode==="sfida") ? trackSpeed(dist)
                  : SPEED_START + DIFFS[diff].sp + levelBonus(level)*(diff===0?0.7:1) + Math.min(lvlBoxes*0.03, diff===0?0.7:0.9);
    if(dashT>0) dashT-=f/60;
    var targetMul = Math.max(invT>0?POWER_MUL:1, dashT>0?1.9:1);
    var rate = (invT>0||dashT>0) ? 0.12 : 0.035;   // accelera in fretta, rallenta dolcemente
    speedMul += (targetMul-speedMul)*rate*f;
    worldSpeed = baseSpeed * speedMul;
    groundOff=(groundOff+worldSpeed*f)%16;
    bgOff=(bgOff+worldSpeed*0.4*f)%60;

    if(hurtT>0) hurtT-=dt;
    if(mode!=="sfida" && level===MAX_LEVEL && !goal) lvl10T+=dt;
    if(tpT>0){
      tpT-=dt;
      if(tpT<=0 && !tpDone){
        if(jetT>0 || invT>0) tpT=0.6;          // con jetpack o invincibilita' non si salta: aspetta
        else { tpDone=true; powers.push({x:W+10, y:104+Math.random()*34, t:0, got:false, kind:"tp"}); }
      }
    }
    if(nearCd>0) nearCd-=dt;
    if(comboPulse>0) comboPulse-=dt*2.2;
    if(comboT>0){ comboT-=dt; if(comboT<=0) comboCash(); }
    for(var ri=rings.length-1;ri>=0;ri--){ var rg0=rings[ri]; rg0.r+=2.6*f; rg0.life-=0.07*f; if(rg0.life<=0) rings.splice(ri,1); }
    if(invT>0){
      var pInv=invT;
      invT-=dt;
      if(pInv>2.0 && invT<=2.0) sfxTicks(1.9);
      if(invT<=0){ invT=0; beatMode="normal"; hurtT=0.7; sfxInvEnd(); } // breve grazia al rientro
    }

    var prevBottom=py+PH;
    riding=false;
    if(grounded){ diveDone=false; diveBuf=0; apexDing=false; }
    if(diveBuf>0){ diveBuf-=dt; if(diveWindow()) execDive(); }
    if(!apexDing && diveWindow()){ apexDing=true; sfxApex(); }

    // jetpack a peto: vola in quota per 4 secondi, poi ricade
    if(jetT>0){
      var pJet=jetT;
      jetT-=dt;
      if(pJet>1.5 && jetT<=1.5) sfxTicks(1.4);
      var ty=jetTgt+Math.sin(blink*0.11)*6;
      vy += ((ty-py)*0.10 - vy)*0.30*f;
      if(vy>4) vy=4; if(vy<-5) vy=-5;
      grounded=false; jumps=2;
      jetPuff+=f;
      if(jetPuff>=2){ jetPuff=0;
        parts.push({x:PX+4+(Math.random()*6-3), y:py+PH-2, vx:-(2+Math.random()*2)-worldSpeed*0.2,
                    vy:(Math.random()*1.6+0.4), r:2+Math.random()*3, life:1, dr:0.05+Math.random()*0.04, c:GREEN});
      }
      if(jetT<=0){ jetT=0; stopJetSfx(); vy=-1; glideFrames=0; }   // a fine jet si puo' planare subito
    }

    // planata (max 2s, mai fuori schermo)
    var wantGlide = jetT<=0 && (holding||padHold) && jumps>=2 && !grounded && glideFrames<GLIDE_MAX;
    gliding=wantGlide;
    if(gliding){ glideFrames+=f; vy += (GLIDE_FALL-vy)*0.18*f; }
    else if(jetT<=0){ vy += (superFlight?SUPER_GRAV:GRAV)*f; }
    py += vy*f;
    if(py<TOP_MARGIN){ py=TOP_MARGIN; if(vy<0) vy=0; }

    grounded=false;
    if(py+PH>=GROUND_Y){
      py=GROUND_Y-PH; vy=0; grounded=true; jumps=0; glideFrames=0; superFlight=false; trickPose=null; flipT=0;
      if(grindCount>=2) endGrind();
      grindCount=0; grindT=0;
    }
    if(flipT>0){ flipT+=f; if(flipT>=flipDur) flipT=0; }

    // avanzamento sul tracciato
    dist += worldSpeed*f;
    if(mode==="sfida"){
      if(!finish && !goal){
        while(TRACK && trackI<TRACK.length && TRACK[trackI].d<=dist){ spawnFromTrack(TRACK[trackI]); trackI++; }
        if(dist>=TRACK_LEN){ finish=true; startFinale(); }
      }
      // registrazione del fantasma, indicizzata sulla distanza
      while(dist-ghLast>=GH_STEP){ ghLast+=GH_STEP; ghRec.push(Math.round(py)); }
    } else {
      if(levelT>0) levelT-=f;
      if(lvlHold>0) lvlHold-=f;
      if(levelT<=0 && lvlHold<=0 && !goal){
        distNext-=worldSpeed*f;
        if(distNext<=0) spawn();
      }
    }
    for(var i=enemies.length-1;i>=0;i--){
      var e=enemies[i];
      e.x-=(worldSpeed+e.extra)*f;
      if(e.type==="hop"){                   // saltella sul posto
        if(e.off<=0){ e.jt-=f; if(e.jt<=0){ e.vy=3.2+Math.random()*1.4; e.jt=45+Math.random()*75; } }
        if(e.vy>0 || e.off>0){ e.off+=e.vy*f; e.vy-=0.28*f; if(e.off<=0){ e.off=0; e.vy=0; } }
      }else if(e.type==="leap"){            // ti salta addosso
        if(e.off<=0){ e.jt-=f; if(e.jt<=0 && e.x<W-20){ e.vy=4.4+Math.random()*1.2; e.dash=2.6; e.jt=70+Math.random()*70; sfxLeap(); } }
        if(e.vy>0 || e.off>0){ e.off+=e.vy*f; e.vy-=0.30*f; if(e.off<=0){ e.off=0; e.vy=0; } }
        if(e.dash>0){ e.x-=e.dash*f; e.dash-=0.06*f; if(e.dash<0) e.dash=0; }
      }else if(e.type==="shoot"){           // spara un colpo da saltare
        e.fire-=f;                          // il timer scorre sempre, non solo nella finestra
        if(e.fire<=0 && e.x<W-2 && e.x>PX+26){
          e.fire=55+Math.random()*55;
          bullets.push({x:e.x, y:GROUND_Y-11, vx:-(worldSpeed+2.8), t:0});
          sfxShoot();
        }
      }
      e.pt+=f; if(e.pt>5){e.pt=0;e.ph=e.ph?0:1;}
      if(!e.passed && !grounded && e.x < PX+PW && e.x+e.w > PX && py+PH <= GROUND_Y-e.h-(e.off||0)){
        var ngap=(GROUND_Y-e.h-(e.off||0))-(py+PH);
        e.ng=(e.ng===undefined)?ngap:Math.min(e.ng,ngap);
      }
      if(!e.passed && e.x+e.w < PX){        // box saltato
        e.passed=true;
        if(e.ng!==undefined && e.ng<=5 && !e.ridden && nearCd<=0 && invT<=0 && hurtT<=0){
          nearCd=0.6; stNear++;
          var nmp=15*DM(); scoreF+=nmp; scorePulse=1;
          addPop({x:W/2, y:Math.max(46,py-8), txt:"PER UN PELO! +"+nmp, col:"#FFFFFF", t:1});
          sfxNear(); vibe([0,15,20,15]); comboAdd();
        }
        lvlBoxes++;                          // il progresso di livello conta sempre
        if(invT<=0 && mode!=="sfida"){      // nella sfida power-up e cuori sono nel tracciato
          boxSince++;
          if(boxSince>=BOX_PER_POWER){ boxSince=0; spawnPower(); sfxSpawnPower(); }
          heartSince++;
          if(heartSince>=HEART_EVERY){ heartSince=0; if(lives<MAX_LIVES) spawnHeart(); }
        }
      }
      if(e.x+e.w< -4) enemies.splice(i,1);
    }

    if(mode!=="sfida" && levelT<=0 && !goal && invT<=0){   // da invincibile il livello non finisce: distruggi!
      if(level<MAX_LEVEL){ if(lvlBoxes>=levelBoxes(level)) levelUp(); }
      else if(lvl10T>=LVL10_TIME) startFinale();   // livello finale: durata standard
    }
    if(goal){
      goal.x-=worldSpeed*f;
      if(goal.x<=PX+PW+2){ win(); return; }
    }

    // atterraggio sulla TESTA dei nemici -> ci si scivola sopra
    if(!grounded && vy>0){
      for(var s=0;s<enemies.length;s++){
        var en=enemies[s], ey=GROUND_Y-en.h-(en.off||0);
        var overX = (PX+3 < en.x+en.w-2) && (PX+PW-3 > en.x+2);
        if(overX && prevBottom<=ey+6 && py+PH>=ey){
          if(en.spike && invT<=0){                  // spuntoni: non ci si atterra sopra
            if(hurtT<=0){
              if(punchCharges>0) punchEnemy(s);
              else hurt();
            }
            break;
          }
          if(en.type==="hop" || en.type==="leap" || en.type==="fly"){
            squash(s,ey); break;                     // saltatori e volanti: si schiacciano
          }
          py=ey-PH; vy=0; grounded=true; jumps=0; glideFrames=0; superFlight=false; trickPose=null; flipT=0;
          riding=true;
          if(!en.ridden){
            en.ridden=true; grindCount++; grindT=1.7; chainStat();
            scoreF += 10*grindCount*DM();
            sfxGrind(grindCount); vibe(10);
            sparks(en.train?GOLD:GREY, 4+Math.min(grindCount,4), PX+PW/2, ey);
            comboAdd();
          }
          break;
        }
      }
    }

    // power-up
    for(var p=powers.length-1;p>=0;p--){
      var pw=powers[p];
      pw.x-=worldSpeed*f; pw.t+=f;
      var cy=pw.y+Math.sin(pw.t*0.055)*13;   // su e giu', senza mai salire troppo
      var dx=Math.max(Math.abs((PX+PW/2)-pw.x)-PW/2,0);
      var dy=Math.max(Math.abs((py+PH/2)-cy)-PH/2,0);
      if(!pw.got && dx*dx+dy*dy < 144){
        pw.got=true;
        if(pw.kind==="punch"){
          punchCharges=PUNCH_MAX; sparks(PUNCH,16,pw.x,cy); sfxPower(); vibe([0,20,30,20]);
          addPts(PTS_PUNCH,PUNCH); hitStop(PUNCH,"PUGNO",0.40,1.3);
        } else if(pw.kind==="super"){
          superJumps=SUPER_MAX; sparks(SUPER,16,pw.x,cy); sfxPower(); vibe([0,20,30,20]);
          addPts(PTS_SUPER,SUPER); hitStop(SUPER,"SUPER SALTO",0.40,1.3);
        } else if(pw.kind==="jet"){
          jetT=JET_TIME; jumps=2; grounded=false; superFlight=false; trickPose=null; flipT=0; jetTgt=JET_Y; jetHintT=2.6; startJetSfx();
          sparks(JET,18,pw.x,cy); sfxPower(); vibe([0,20,30,20,30,25]);
          addPts(PTS_JET,JET); hitStop(JET,"JETPACK!",0.40,1.5);
        } else if(pw.kind==="tp"){
          tpGot=true; sparks("#FFFFFF",22,pw.x,cy); sfxPower(); vibe([0,30,45,30]);
          addPop({x:pw.x, y:cy-12, txt:"+300 A FINE PARTITA", col:"#FFFFFF", t:1});
          hitStop("#FFFFFF","CARTA IGIENICA!",0.55,1.8);
        } else if(pw.kind==="heart"){
          lives=Math.min(MAX_LIVES,lives+1); sparks(HEART,14,pw.x,cy); sfxHeart(); vibe([0,20,40,20]);
          addPts(PTS_HEART,HEART);   // mezzo cuore: nessun blocco
        } else {
          invT=INV_TIME; beatMode="power"; sparks(GOLD,24,pw.x,cy); sfxPower(); vibe([0,25,40,25,40,30]);
          if(jetT>0){ jetT=0; stopJetSfx(); vy=0.5; glideFrames=0; }   // il jetpack cede il posto al fuoco
          if(!fireHintOff){
            fireHintT=INV_TIME;                                  // resta finche' non spari
            hitStop(GOLD,"TOCCA PER SPARARE!",0.6,2.0);          // fermo immagine: impossibile non vederlo
          }
          addPts(PTS_INV,GOLD); hitStop(GOLD,"INVINCIBILE",1.0,3.2);
        }
        powers.splice(p,1); continue;
      }
      if(pw.kind==="tp" && !pw.got && (jetT>0||invT>0)){
        powers.splice(p,1); tpDone=false; tpT=1.5+Math.random()*2.5;   // power-up in corso: il rotolo torna dopo
        continue;
      }
      if(pw.x< -14){
        if(pw.kind==="tp" && !pw.got){       // carta igienica mancata
          addPop({x:W/2, y:112, txt:"Oh no...", col:"#FFFFFF", t:1});
          sfxNo();
        }
        powers.splice(p,1);
      }
    }

    for(var qi=pops.length-1;qi>=0;qi--){
      var q=pops[qi]; q.y-=0.55*f; q.t-=0.014*f;
      if(q.t<=0) pops.splice(qi,1);
    }

    // grind: decadimento combo e scintille sotto i piedi
    if(grindT>0){ grindT-=dt; if(grindT<=0){ if(grindCount>=2) endGrind(); grindCount=0; } }
    if(trickT>0) trickT-=dt;
    if(riding && Math.random()<0.5) sparks(GOLD,1,PX+2+Math.random()*PW*0.6,py+PH-1);

    // buffer del salto + coyote time (compensano i comandi in ritardo)
    if(grounded){ coyote=0.12; if(jumpBuf>0){ jumpBuf=0; jump(); } }
    else { if(coyote>0) coyote-=dt; if(jumpBuf>0) jumpBuf-=dt; }

    // pedane di scatto (solo difficile)
    for(var pi=pads.length-1;pi>=0;pi--){
      var pd=pads[pi];
      pd.x-=worldSpeed*f;
      if(pd.x<-30){ pads.splice(pi,1); continue; }
      if(!pd.used && grounded && pd.x<=PX+PW && pd.x+26>=PX){
        pd.used=true; dashT=1.5; sfxDash(); vibe([0,25,25,25]);
        sparks(GOLD,10,PX+PW/2,GROUND_Y-4);
      }
    }

    // proiettili
    for(var bi=bullets.length-1;bi>=0;bi--){
      var bl=bullets[bi];
      bl.x+=bl.vx*f; bl.t+=f;
      if(bl.x<-12){ bullets.splice(bi,1); continue; }
      if(invT>0 || hurtT>0) continue;
      var bx=Math.max(Math.abs((PX+PW/2)-bl.x)-PW/2+2,0);
      var by=Math.max(Math.abs((py+PH/2)-bl.y)-PH/2+2,0);
      if(bx*bx+by*by < 30){
        if(punchCharges>0){
          punchX=bl.x; punchY=bl.y; punchT=0.2; sparks(PUNCH,10,bl.x,bl.y);
          var bpts=15*DM();
          punchCharges--; scoreF+=bpts; scorePulse=1; comboAdd();
          addPop({x:bl.x, y:bl.y-8, txt:"PUGNO! +"+bpts, col:PUNCH, t:1});
          kfreezeT=0.05; shakeT=0.10;
          sfxPunch(); sfxBreak(0.7); vibe([0,25,30,25]);
        } else { hurt(); }
        bullets.splice(bi,1);
      }
    }

    // palle di fuoco del giocatore (solo durante l'invincibilita')
    if(fireCd>0) fireCd-=f;
    for(var fi=fires.length-1;fi>=0;fi--){
      var fb=fires[fi]; fb.x+=fb.vx*f; fb.t+=f; fb.y+=Math.sin(fb.t*0.6)*0.3*f;
      var fdead=false;
      for(var bj=bullets.length-1;bj>=0;bj--){
        var bl2=bullets[bj];
        if(Math.abs(bl2.x-fb.x)<6 && Math.abs(bl2.y-fb.y)<8){
          sparks(ORANGE,5,bl2.x,bl2.y); bullets.splice(bj,1); fdead=true; break;
        }
      }
      if(!fdead) for(var ej=0;ej<enemies.length;ej++){
        var en2=enemies[ej], efy=GROUND_Y-en2.h-(en2.off||0);
        if(fb.x+3>en2.x && fb.x-3<en2.x+en2.w && fb.y+3>efy && fb.y-3<efy+en2.h){
          // un colpo = un'uccisione
          sparks(ORANGE,6,fb.x,fb.y); sfxFirePop();
          sparks(GOLD,12,en2.x+en2.w/2,efy+en2.h/2);
          enemies.splice(ej,1); lvlBoxes++;      // il nemico distrutto conta come progresso
          var fpts=20*DM();
          scoreF+=fpts; scorePulse=1;
          addPop({x:en2.x+en2.w/2, y:efy-4, txt:"+"+fpts, col:GOLD, t:1});
          kfreezeT=0.08; shakeT=0.12;
          rings.push({x:en2.x+en2.w/2, y:efy+en2.h/2, r:3, life:1});
          comboAdd();
          sfxPunch(); vibe([0,20,25,20]);
          fdead=true; break;
        }
      }
      if(fdead || fb.x>W+24) fires.splice(fi,1);
    }

    // da invincibile chi ti tocca viene sfondato a pugni: sei una furia
    if(invT>0){
      var pbi={x:PX+2,y:py+2,w:PW-4,h:PH-2};
      for(var ji=enemies.length-1;ji>=0;ji--){
        var ei=enemies[ji], eyi=GROUND_Y-ei.h-(ei.off||0);
        if(pbi.x<ei.x+ei.w-1 && pbi.x+pbi.w>ei.x+1 && pbi.y<eyi+ei.h-1 && pbi.y+pbi.h>eyi+1){
          punchEnemy(ji,true);
        }
      }
    }
    // urto laterale: se hai il pugno lo usa in automatico, altrimenti perdi una vita
    if(invT<=0 && hurtT<=0){
      var pb={x:PX+4,y:py+4,w:PW-8,h:PH-6};
      for(var j=0;j<enemies.length;j++){
        var e2=enemies[j], ey2=GROUND_Y-e2.h-(e2.off||0);
        if(e2.type==="fly" && !e2.spike) continue;   // verde volante: si cavalca e basta, non ferisce mai
        var eb={x:e2.x+2,y:ey2+3,w:e2.w-4,h:e2.h-4};
        if(pb.x<eb.x+eb.w && pb.x+pb.w>eb.x && pb.y<eb.y+eb.h && pb.y+pb.h>eb.y){
          // aggancio di bordo: sfiori la testa di un nemico SENZA spuntoni -> ci sali sopra, niente danno
          if(!e2.spike && (e2.type==="hop"||e2.type==="leap") && vy>0 && py+PH-ey2<=9){
            squash(j,ey2); break;                    // sfiori la testa di un saltatore: lo schiacci
          }
          if(!e2.spike && (e2.off||0)<=0 && py+PH-ey2<=9){
            py=ey2-PH; vy=0; grounded=true; jumps=0; glideFrames=0; superFlight=false; trickPose=null; flipT=0;
            riding=true;
            if(!e2.ridden){
              e2.ridden=true; grindCount++; grindT=1.7; chainStat();
              scoreF += 10*grindCount*DM();
              sfxGrind(grindCount); vibe(10);
              sparks(e2.train?GOLD:GREY, 4+Math.min(grindCount,4), PX+PW/2, ey2);
              comboAdd();
            }
            break;
          }
          if(punchCharges>0){ punchEnemy(j); }
          else { hurt(); }
          break;
        }
      }
    }
    if(punchT>0) punchT-=dt;

    // particelle
    for(var k=parts.length-1;k>=0;k--){
      var pt=parts[k];
      pt.x+=pt.vx*f; pt.y+=pt.vy*f; pt.vy+=0.02*f; pt.r+=0.1*f; pt.life-=pt.dr*f;
      if(pt.life<=0) parts.splice(k,1);
    }
    // spruzzi di ghiaccio dei pattini
    if(SKINS[skin].skate && grounded){
      skateFx+=f;
      if(skateFx>=4){ skateFx=0;
        parts.push({x:PX+15+(Math.random()*4-2), y:GROUND_Y-2,
          vx:-(1.2+Math.random()*1.8)-worldSpeed*0.2, vy:-(Math.random()*0.9),
          r:0.9+Math.random()*1.3, life:1, dr:0.09+Math.random()*0.05, c:"#DFF6FF"});
      }
    }
    // scia planata
    if(gliding){
      glideTrail+=f;
      if(glideTrail>=5){ glideTrail=0;
        parts.push({x:PX+3+(Math.random()*4-2),y:py+PH-2,vx:-(0.6+Math.random()*1.2)-worldSpeed*0.15,vy:(Math.random()*0.6+0.1),r:1.5+Math.random()*2,life:1,dr:0.08+Math.random()*0.05,c:(SKINS[skin].puff||GREEN)});
      }
    }
    if(gliding&&!prevGliding) startGlideSfx();
    if(!gliding&&prevGliding) stopGlideSfx();
    prevGliding=gliding;

    // punteggio
    if(grounded){ legTimer+=f*(0.5+worldSpeed*0.12); }
    scoreF+=worldSpeed*f*0.12*DM(); score=Math.floor(scoreF);
    var m=Math.floor(score/100);
    if(m>lastMile){ lastMile=m; scorePulse=1; vibe(16); sfxTick(); }
  }

  function addPts(n,col){
    n=n*DM();
    scoreF=Math.max(0,scoreF+n); score=Math.floor(scoreF);
    addPop({x:PX+PW/2, y:py-2, txt:(n>0?"+":"")+n, col:col||WHITE, t:1});
  }
  // i popup non si sovrappongono: si accodano verso l'alto, massimo sei alla volta
  function addPop(o){
    var yy=o.y;
    for(var g=0; g<4; g++){
      var clash=false;
      for(var i=0;i<pops.length;i++){
        var q=pops[i];
        if(q.t>0.42 && Math.abs(q.x-o.x)<52 && Math.abs(q.y-yy)<13){ clash=true; break; }
      }
      if(!clash) break;
      yy-=14;
    }
    o.y=yy;
    while(pops.length>=6) pops.shift();
    pops.push(o);
  }
  function hitStop(col,txt,dur,pw){
    freezeMax=dur||0.22; freezeT=freezeMax; freezeCol=col; freezeTxt=txt; freezePow=pw||1;
  }
  function endGrind(){
    trickN=grindCount; trickBonus=25*grindCount*grindCount*DM();
    scoreF+=trickBonus; trickT=1.4; scorePulse=1;
    sfxVoice(); vibe([0,20,30,25]);
    sparks(GOLD,14,PX+PW/2,py+PH);
  }
  function comboAdd(){
    comboN++; comboT=3.0; comboPulse=1;
    if(comboN>stCombo) stCombo=comboN;
    if(comboN>=3) sfxComboTick(comboN);
  }
  function unlockNow(idx){
    if(newUnl.indexOf(idx)>=0) return;
    newUnl.push(idx);
    hitStop(SKINS[idx].c, "SKIN SBLOCCATA: "+SKINS[idx].n+"!", 0.8, 2.2);
    sfxFanfare(); vibe([0,30,50,30,50,45]);
    addPop({x:W/2, y:104, txt:"nuovo personaggio disponibile!", col:"#FFFFFF", t:1});
    for(var u9=0;u9<26;u9++) parts.push({x:PX+PW/2+(Math.random()*30-15), y:py+PH/2+(Math.random()*24-12),
      vx:(Math.random()*6-3), vy:-(1+Math.random()*4), r:1.4+Math.random()*2.4, life:1,
      dr:0.02+Math.random()*0.03, c:(Math.random()<0.5)?SKINS[idx].c:GOLD});
  }
  function chainStat(){
    if(grindCount>stChain) stChain=grindCount;
    if(grindCount>=10 && !UNL.c10){ UNL.c10=1; unlockNow(4); }
  }
  function comboCash(){
    if(comboN>=3){
      var cb=12*comboN*DM();
      scoreF+=cb; scorePulse=1;
      addPop({x:PX+PW/2, y:py-6, txt:"COMBO x"+comboN+" +"+cb, col:GOLD, t:1});
      sfxComboCash();
    }
    comboN=0; comboT=0;
  }
  function comboBreak(){ comboN=0; comboT=0; }
  function hurt(){
    comboBreak();
    lives-=2; hurtT=HURT_TIME; hitFlash=7; grindCount=0; grindT=0; addPts(PTS_HURT,"#FF6B5E");   // un colpo = un cuore intero
    sfxHurt(); vibe([0,35,60,35]);
    sparks(ORANGE,10,PX+PW/2,py+PH/2);
    if(vy>0) vy=-5.2;
    if(lives<=0) die();
  }

  function dieSaveUnl(){ saveUnl(); }
  function die(){
    dieSaveUnl();
    deathFlash=6; state="dead"; deadT=3.2;
    if(mode==="sfida") keepGhost();
    gliding=false; prevGliding=false; stopGlideSfx(); stopJetSfx(); jetT=0; stopBeat(); beatMode="normal";
    sfxGroan();
    if(score>best){ best=score; try{localStorage.setItem("fartflip_best",String(best));}catch(e){} }
  }

  // ---- disegno ----
  function drawGroundOnlyBg(){

    g.addColorStop(1,hexA(lvlAcc(),0.45));
    ctx.fillStyle=g; ctx.fillRect(0,GROUND_Y-7,W,9);

    ctx.fillStyle=hexA(lvlAcc(),0.25); ctx.fillRect(0,GROUND_Y+1.5,W,0.8);
  }
  function drawGround(){

    // tacche di corsia, sincronizzate col mondo (groundOff)
    ctx.fillStyle=hexA(lvlAccDk(),0.85);
    for(var x=-16-groundOff; x<W; x+=16){ rrf(x,GROUND_Y+5,7,1.8,0.9); }

    for(var x2=-16-groundOff; x2<W; x2+=16){ ctx.fillRect(x2,GROUND_Y+4.4,7,0.6); }

  function drawBody(phase,gnd,glid,inv,tt,pose){
    var S=SKINS[skin];
    var base = inv ? (Math.floor(tt/5)%2 ? GOLD : "#FFF6DC") : S.c;
    var dark = inv ? "#C77800" : S.d;
    hdFaceMood = (pose==="squat" || (pose==="sit" && winPoop)) ? "strain" : "norm";
    var cyc = hdCyc;               // fase di corsa accumulata in hdFrameBegin
    var swf=Math.sin(cyc), swb=Math.sin(cyc+3.14159);          // oscillazione gambe avanti/dietro
    var isk = !!S.skate;                                    // pattina invece di correre
    var irid = !!S.ride;                                    // sta in piedi sullo skate, gambe ferme
    var rsw = irid ? Math.sin(cyc*0.26) : 0;                // leggero equilibrio
    var pa  = isk ? (Math.sin(cyc*0.42)+1)/2 : 0;           // 0 = piede sotto, 1 = spinta indietro
    var skBX = 8.1-7.5*pa, skBY = 29.6-5.6*pa;              // piede che spinge
    var skFX = 10.6+pa*0.8, skFY = 29.6;                    // piede che scivola
    var bob = (gnd&&!pose&&!glid) ? (isk ? -0.7*pa : (irid ? -0.35-0.25*rsw : -Math.abs(Math.sin(cyc))*0.8)) : 0;
    var OV = devPoseOvr(pose,glid,gnd,isk);
    function limbData(d,w,cl){ if(d && d.length>=6) limb2(+d[0],+d[1],+d[2],+d[3],+d[4],+d[5],w,cl); else if(d) limb(+d[0],+d[1],+d[2],+d[3],w,cl); }

    ctx.save();
    var bA=ctx.globalAlpha;              // rispetta la trasparenza ereditata (es. fantasma al 15%)
    ctx.translate(0,bob);

    // sciarpa (dietro al corpo)
    ctx.strokeStyle=inv?"#FFE9A6":GOLD; ctx.lineWidth=2.1;
    ctx.beginPath(); ctx.moveTo(5.6,14.2);
    for(var si=1;si<=4;si++){
      var wob=Math.sin(tt*0.22 - si*0.95)*(0.7+si*0.55)*(glid?1.7:1);
      ctx.lineTo(5.6-si*3.0, 14.6+si*0.35+wob-(glid?si*1.15:0));
    }
    ctx.globalAlpha=bA*0.95; ctx.stroke(); ctx.globalAlpha=bA;

    // calzature delle skin extra: stivali, pattini, skate
    function feetPos(){
      if(OV && OV.feet) return OV.feet;
      if(pose==="squat") return [[5.6,29.4],[15.4,29.4]];
      if(pose==="tuck")  return [[10.2,19.8],[12.0,19.6]];
      if(pose==="star")  return [[2.4,29.4],[19.6,29.4]];
      if(pose==="sit")   return [[16.6,29.0],[20.2,29.0]];
      if(pose==="dab")   return [[6.2,29.2],[16.2,29.2]];
      if(pose==="split") return [[1.2,17.2],[21.6,28.6]];
      if(pose==="pirou") return [[10.6,29.8],[12.0,20.4]];
      if(pose==="arab")  return [[-3.0,13.8],[13.2,29.9]];
      if(pose==="fifth") return [[9.8,29.9],[12.4,29.9]];
      if(pose==="grab")  return [[5.0,27.8],[17.0,27.8]];
      if(glid && isk)    return [[3.2,24.2],[11.8,29.9]];
      if(glid)           return [[8.9,29.8],[8.9,29.8]];
      if(gnd && isk)     return [[skBX,skBY],[skFX,skFY]];
      if(gnd && irid)    return [[8.2,29.6],[14.8,29.6]];
      if(gnd)            return [[9.6+4.4*swb, 29.5-Math.max(0,Math.cos(cyc+3.14159))*2.6],
                                 [12.4+4.4*swf,29.5-Math.max(0,Math.cos(cyc))*2.6]];
      return [[7.2,28.6],[14.8,28.2]];
    }
    function drawFoot(i){
      var FP=feetPos(), fx=FP[i][0], fy=FP[i][1];
      if(S.boot==="boots"){
        ctx.fillStyle=S.d; rrf(fx-3.3,fy-1.4,6.8,4.0,1.3);
        ctx.fillStyle="#8f8f9b"; ctx.fillRect(fx-3.1,fy+2.2,6.4,1.0);
        ctx.fillStyle=S.c; ctx.fillRect(fx-1.2,fy-1.0,1.3,2.6);
        ctx.fillStyle="rgba(255,255,255,.18)"; ctx.fillRect(fx-3.1,fy-1.2,6.4,0.7);
      }else if(S.boot==="skates"){
        ctx.fillStyle=S.f; rrf(fx-1.9,fy-0.9,3.9,2.3,0.8);
        ctx.fillStyle=S.c; ctx.fillRect(fx-1.7,fy,3.6,0.5);
        ctx.strokeStyle=S.f; ctx.lineWidth=0.9; ctx.lineCap="round";
        ctx.beginPath();
        ctx.moveTo(fx-2.4,fy+2.3); ctx.lineTo(fx+2.2,fy+2.3);
        ctx.moveTo(fx-1.9,fy+2.3); ctx.lineTo(fx-1.9,fy+1.3);
        ctx.moveTo(fx+1.7,fy+2.3); ctx.lineTo(fx+1.7,fy+1.3);
        ctx.stroke();
      }
    }
    function drawBoard(){
      var FP=feetPos();
      var mx=(FP[0][0]+FP[1][0])/2, my=Math.max(FP[0][1],FP[1][1]);
      ctx.fillStyle=S.d;       rrf(mx-9.5,my+1.6,19,2.4,1.2);
      ctx.fillStyle=S.c;       ctx.fillRect(mx-8.4,my+1.9,16.8,1.0);
      ctx.fillStyle="#8a8a95"; ctx.fillRect(mx-6.4,my+3.8,1.6,1.4); ctx.fillRect(mx+4.8,my+3.8,1.6,1.4);
      ctx.fillStyle="#e8e8f0";
      ctx.beginPath(); ctx.ellipse(mx-5.6,my+5.0,1.6,1.6,0,0,6.283); ctx.fill();

    // arto/gamba dietro

    }else if(pose==="fifth"){
      limb(9.4,22.5, 9.8,29.9, 3.0, dark);
    }else if(pose==="sit"){
      limb2(9,23, 15.5,24.5, 16.6,29.0, 3.0, dark);
    }else if(glid && isk){
      limb2(10.0,22.6, 7.0,26.8, 3.2,24.2, 3.0, dark);     // gamba libera piegata dietro, punta alta
    }else if(glid){
      limb(9.6,23, 6.2,29.2, 3.0, dark);
    }else if(gnd && irid){
      limb2(9.8,22.6, 8.6,26.0, 8.2,29.6, 3.0, dark);       // piede posteriore piantato sulla tavola
    }else if(gnd && isk){
      limb2(10.2,22.6, (10.2+skBX)/2-0.6,26.2-1.4*pa, skBX,skBY, 3.0, dark);
    }else if(gnd){
      var blift=Math.max(0,Math.cos(cyc+3.14159))*2.6;
      limb2(9.6,22.6, 9.6+2.2*swb,26.0, 9.6+4.4*swb,29.5-blift, 3.0, dark);
    }else{
      limb2(9.6,22.6, 8.0,26.4, 7.2,28.6, 3.0, dark);
    }
    if(S.boot && S.boot!=="skate") drawFoot(0);
    // braccio dietro
    if(OV && OV.ba){ limbData(OV.ba,2.5,dark); }
    else if(pose==="star"){ limb(6.2,15.2, -1.8,9.8, 2.5, dark); }
    else if(pose==="tuck"){ limb2(6.2,15.2, 4.6,18.6, 7.6,20.4, 2.5, dark); }
    else if(pose==="dab"){ limb2(6.2,15.2, 1.2,10.8, -1.8,7.4, 2.5, dark); }
    else if(pose==="split"){ limb(6.2,15.2, -1.4,11.4, 2.5, dark); }
    else if(pose==="pirou"){ limb(6.0,15.2, -2.8,12.6, 2.5, dark); }
    else if(pose==="grab"){ limb2(6.2,15.2, 3.2,18.6, 5.4,22.2, 2.5, dark); }
    else if(pose==="arab"){ limb(6.2,15.0, 12.6,9.4, 2.5, dark); }
    else if(pose==="fifth"){ limb2(6.2,15.0, 3.6,8.4, 8.2,2.8, 2.5, dark); }
    else if(gnd && irid){ limb(6.0,15.4, 0.6,13.4+rsw*1.6, 2.5, dark); }
    else if(gnd && isk){ limb(6.0,15.4, 0.8,13.0+pa*2.2, 2.5, dark); }
    else if(pose==="sit"){ limb2(6.2,15.4, 6.8,19.4, 10.2,21.6, 2.5, dark); }
    else if(pose==="squat"){ limb2(6.2,16.2, 4.6,19.0, 8.2,20.2, 2.5, dark); }
    else if(glid && isk){ limb2(6.2,15.2, 4.2,18.6, 8.8,16.8, 2.5, dark); }
    else if(glid){ limb(6.0,15.4, -2.6,14.4, 2.6, dark); }
    else if(gnd){ limb2(6.4,15.2, 6.4+2.4*swf,17.6, 6.4+3.0*swf,19.8, 2.5, dark); }
    else { limb2(6.2,15.2, 4.0,12.8, 3.2,10.6, 2.5, dark); }

    // busto
    var bg=ctx.createLinearGradient(0,12.4,0,24.2);
    bg.addColorStop(0,base); bg.addColorStop(0.62,base); bg.addColorStop(1,dark);
    ctx.fillStyle=bg; rrf(4.5,12.5,13,11.6,4.2);
    ctx.fillStyle="rgba(255,255,255,.13)"; rrf(5.4,13.2,4.4,6.6,2.2);       // luce
    ctx.fillStyle=hexA("#FFB46A",0.30); rrf(15.7,13.6,1.3,8.2,0.65);        // rim caldo sul fronte
    ctx.fillStyle=hexA(dark,0.55); rrf(7.6,18.2,6.8,4.4,1.9);               // tasca della felpa
    ctx.strokeStyle="rgba(8,6,12,.5)"; ctx.lineWidth=0.7; rrp(ctx,4.5,12.5,13,11.6,4.2); ctx.stroke();

    // gamba davanti
    if(OV && OV.fl){ limbData(OV.fl,3.0,base); }else if(pose==="squat"){
      limb2(13,22.5, 17.8,25.5, 15.4,29.4, 3.1, base);
      ctx.fillStyle=dark;                                                    // ginocchia larghe
      ctx.beginPath(); ctx.ellipse(4.6,25.8,1.9,1.9,0,0,6.283); ctx.fill();
      ctx.beginPath(); ctx.ellipse(17.6,25.8,1.9,1.9,0,0,6.283); ctx.fill();
    }else if(pose==="tuck"){
      limb2(13,22, 14.6,18.4, 12.0,19.6, 3.0, base);
    }else if(pose==="star"){
      limb(13,22.5, 19.6,29.4, 3.0, base);
    }else if(pose==="dab"){
      limb2(13,22.5, 15.0,26.2, 16.2,29.2, 3.0, base);
    }else if(pose==="split"){
      limb(13,22.5, 21.6,28.6, 3.0, base);
    }else if(pose==="pirou"){
      limb2(12.6,22.5, 15.0,19.2, 12.0,20.4, 3.0, base);
    }else if(pose==="grab"){
      limb2(13,22.5, 16.0,25.4, 17.0,27.8, 3.0, base);

      limb(12.8,22.5, 13.2,29.9, 3.0, base);
    }else if(pose==="fifth"){
      limb(12.6,22.5, 12.4,29.9, 3.0, base);
    }else if(pose==="sit"){

    }else if(glid && isk){

    }else if(glid){
      limb(12.4,23, 8.9,29.8, 3.0, base);
    }else if(gnd && irid){
      limb2(12.6,22.6, 14.0,26.0, 14.8,29.6, 3.0, base);    // piede anteriore avanti, ginocchio morbido
    }else if(gnd && isk){
      limb2(11.6,22.6, 11.0,26.0, skFX,skFY, 3.0, base);
    }else if(gnd){
      var flift=Math.max(0,Math.cos(cyc))*2.6;
      limb2(12.4,22.6, 12.4+2.2*swf,26.0, 12.4+4.4*swf,29.5-flift, 3.0, base);
    }else{
      limb2(12.4,22.6, 13.8,26.2, 14.8,28.2, 3.0, base);
    }
    if(S.boot==="skate") drawBoard();
    else if(S.boot) drawFoot(1);
    // braccio davanti
    if(OV && OV.fa){ limbData(OV.fa,2.5,base); }
    else if(pose==="star"){ limb(15.8,15.2, 23.8,9.8, 2.5, base); }
    else if(pose==="tuck"){ limb2(15.8,15.2, 17.4,18.6, 14.4,20.4, 2.5, base); }
    else if(pose==="dab"){ limb2(15.8,15.2, 12.2,13.0, 8.4,11.2, 2.5, base); }
    else if(pose==="split"){ limb(15.8,15.2, 22.6,11.4, 2.5, base); }
    else if(pose==="pirou"){ limb(16.0,15.2, 24.8,12.6, 2.5, base); }
    else if(pose==="grab"){ limb2(15.8,15.2, 18.2,19.2, 16.2,22.6, 2.5, base); }

    else if(pose==="fifth"){ limb2(15.8,15.0, 18.4,8.4, 13.8,2.8, 2.5, base); }

    else if(gnd && isk){ limb(16.0,15.4, 21.4,13.4-pa*2.2, 2.5, base); }
    else if(pose==="sit"){ limb2(15.8,15.4, 16.4,19.4, 13.2,21.6, 2.5, base); }

    else if(glid && isk){ limb(15.8,15.4, 23.2,17.2, 2.5, base); }

    else if(gnd){ limb2(15.6,15.2, 15.6+2.4*swb,17.6, 15.6+3.0*swb,19.8, 2.5, base); }
    else { limb2(15.8,15.2, 18.0,12.8, 18.8,10.6, 2.5, base); }

    // testa
    drawFace(S,base);
    ctx.restore();

  function drawPlayer(px,pyy,angle,phase,gnd,glid,blinkOff,inv,tt,pose){
    if(blinkOff) return;
    // ombra a contatto col terreno
    if(state!=="win"){
      var hgt=GROUND_Y-(pyy+PH);
      if(hgt>-2){
        var sh=Math.max(0,1-hgt/150);
        ctx.save(); ctx.globalAlpha=0.28*sh; ctx.fillStyle="#000";
        ctx.beginPath(); ctx.ellipse(px+PW/2,GROUND_Y+2.4,8.5+(1-sh)*7,2.4,0,0,6.283); ctx.fill();
        ctx.restore();
      }
    }
    // scia di velocita'
    if(state==="play" && (dashT>0 || speedMul>1.28)){
      ctx.save();
      for(var ti=0;ti<3;ti++){
        ctx.globalAlpha=0.11-ti*0.033;
        ctx.fillStyle=inv?GOLD:ORANGE;
        rrf(px-5-ti*6, pyy+4, 12, PH-8, 5);
      }
      ctx.restore();
    }
    // squash & stretch (solo visivo)
    var sx=1, sy=1;
    if(state==="play"){
      if(gnd && !hdWasG) hdLandT=0.13;
      hdWasG=gnd;
      if(hdLandT>0){
        hdLandT-=0.016;
        var k=Math.max(0,hdLandT)/0.13;
        sy=1-0.20*k; sx=1+0.18*k;
      }else if(!gnd && !glid){
        var st=Math.min(0.15,Math.abs(vy)*0.015);
        sy=1+st; sx=1-st*0.65;
      }
    }
    var lean=(state==="play"&&gnd&&angle===0&&!pose&&!glid)?Math.min(0.10,Math.max(0,(worldSpeed-3)*0.022)):0;
    ctx.save();
    ctx.translate(px+PW/2,pyy+PH/2);
    ctx.rotate(angle+lean);
    ctx.scale(sx,sy);
    ctx.translate(-PW/2,-PH/2);
    drawBody(phase,gnd,glid,inv,tt,pose);
    ctx.restore();
    if(state==="play" && !blinkOff && diveWindow() && !gliding){
      ctx.save(); ctx.globalAlpha=0.2;
      var fxp=px+PW-5, fyp=pyy+PH+1.5;
      var sg2=ctx.createRadialGradient(fxp,fyp,0.3,fxp,fyp,6);
      sg2.addColorStop(0,"rgba(255,255,255,.95)"); sg2.addColorStop(0.4,"rgba(255,194,74,.7)"); sg2.addColorStop(1,"rgba(255,194,74,0)");
      ctx.fillStyle=sg2; ctx.beginPath(); ctx.arc(fxp,fyp,6,0,6.283); ctx.fill();
      ctx.strokeStyle="#FFFFFF"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(fxp-4,fyp); ctx.lineTo(fxp+4,fyp); ctx.moveTo(fxp,fyp-4); ctx.lineTo(fxp,fyp+4); ctx.stroke();
      ctx.restore();
    }
    if(inv){
      var ga=(0.22*Math.min(1,invT/1.5)).toFixed(3);
      var gg=ctx.createRadialGradient(px+PW/2,pyy+PH/2,4,px+PW/2,pyy+PH/2,26);
      gg.addColorStop(0,"rgba(255,194,74,"+ga+")"); gg.addColorStop(1,"rgba(255,194,74,0)");
      ctx.fillStyle=gg; ctx.fillRect(px-26,pyy-26,PW+52,PH+52);
      ctx.save();
      ctx.globalAlpha=0.5+Math.sin(tt*(invT<2?0.85:0.25))*0.35;
      ctx.strokeStyle=GOLD; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(px+PW/2,pyy+PH/2,20,0,6.283); ctx.stroke();
      ctx.restore();
    }
  }

  function drawSkinArrow(cx,cy,dir,a){
    ctx.save();
    ctx.globalAlpha=a*0.28; ctx.fillStyle=ORANGE;
    ctx.beginPath(); ctx.moveTo(cx+dir*16,cy); ctx.lineTo(cx-dir*5,cy-17); ctx.lineTo(cx-dir*5,cy+17);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha=a; ctx.fillStyle="#FFFFFF";
    ctx.beginPath(); ctx.moveTo(cx+dir*11,cy); ctx.lineTo(cx-dir*5,cy-13); ctx.lineTo(cx-dir*5,cy+13);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  function drawPreview(cx,cy,sc,tt){
    ctx.save(); ctx.globalAlpha=0.22; ctx.fillStyle="#000";
    ctx.beginPath(); ctx.ellipse(cx,cy+PH*sc/2+2.5,10*sc,2.2*sc,0,0,6.283); ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(cx,cy); ctx.scale(sc,sc); ctx.translate(-PW/2,-PH/2);
    drawBody(Math.floor(tt/18)%2,true,false,false,tt,null);
    ctx.restore();
  }

  function drawEnemy(e){
    var off=e.off||0;
    var ey=GROUND_Y-e.h-off, ew=e.w, eh=e.h, ex=e.x;
    var bodyC = e.type==="wide" ? "#8F9BB0" : e.type==="hop" ? "#D9C79E" :
                e.type==="leap" ? "#C48CE8" : e.type==="shoot" ? "#E8A33D" :
                e.type==="fly"  ? "#7FE3D0" : GREY;
    var darkC = e.type==="wide" ? "#5C6B85" : e.type==="hop" ? "#A08D5F" :
                e.type==="leap" ? "#7B4DA8" : e.type==="shoot" ? "#A06B18" :
                e.type==="fly"  ? "#3E9E8E" : GREY_DK;
    var eyeC  = e.type==="wide" ? GOLD : e.type==="hop" ? "#FF4D6D" :
                e.type==="shoot" ? "#FF4D6D" : ORANGE;
    if(off>1){ ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fillRect(ex+2,GROUND_Y-2,ew-4,2); }
    ctx.fillStyle=bodyC; ctx.fillRect(ex,ey,ew,eh);
    if(e.spike){                                   // spuntoni: non atterrargli sopra
      ctx.fillStyle="#FF4D6D";
      for(var sx=ex+2; sx<ex+ew-2; sx+=6){

    ctx.beginPath(); ctx.arc(pw.x,cy,15,0,6.283); ctx.fill();
    ctx.restore();
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(pw.x,cy,9,0,6.283); ctx.fill();
    ctx.fillStyle=INK;
    ctx.beginPath(); ctx.arc(pw.x,cy,6,0,6.283); ctx.fill();

      ctx.fillRect(pw.x-4,cy-3,6,6); ctx.fillRect(pw.x+2,cy-1,3,2);

  var blink=0;
  function loop(now){
    var dt=now-(loop.last||now); loop.last=now;
    var f=Math.max(0.1,Math.min(2.5,dt/16.67));
    if(state==="play" && !paused && slowMoT>0){ slowMoT-=f/60; f*=0.45; }   // rallenty "per un pelo"
    blink+=f;

    pollPad();
    if(state==="intro"){
      introT-=f/60;
      if(introT<=6.0 && introT+f/60>6.0) sfxGroan();
      if(introT<=4.2 && introT+f/60>4.2) sfxDouble();
      if(introT<=0) startTutorial();
    }
    if(state==="dead"){
      var pd0=deadT; deadT-=f/60;
      if(pd0>2.2 && deadT<=2.2){ sfxSuper(); vibe([0,70,40,70]); }
      if(pd0>1.1 && deadT<=1.1){ sfxVoice(); }
      if(deadT<=0){ state="entry"; entryLock=22; entryIdx=0; entryL=[0,0,0]; savedIdx=-1; }
    }
    if(state==="win"){
      if(!winMashDone && (WIN_T-winT)>=WIN_GATE){
        winMashT+=f/60;                                   // tempo fermo: tocca a raffica!
        startMashSfx();
        winMash=Math.max(0, winMash-MASH_DECAY*(f/60));   // se rallenti, la barra torna indietro
        var mlv=Math.min(1,winMash/WIN_MASH_N);
        setMashLevel(mlv);
        if(shakeT<mlv*0.10) shakeT=mlv*0.10;
        if(winMash>=WIN_MASH_N || winMashT>=9) winBurst();
      } else {
      var w0=winT; winT-=f/60;
      var eA0=WIN_T-w0, eA1=WIN_T-winT;
      if(eA0<=0.15 && eA1>0.15) sfxWhoosh();
      if(eA0<=2.20 && eA1>2.20){ sfxThud(); vibe([0,70,40,70]); }
      if(eA0<=5.50 && eA1>5.50) sfxJump();
      if(eA0<=6.40 && eA1>6.40){ sfxSuper(); sfxVoice(); vibe([0,30,40,30]); }
      if(eA0<=6.90 && eA1>6.90){ sfxPoop(2.9); vibe([0,150,60,150,60,220]); }
      if(eA0<=9.80 && eA1>9.80){ sfxSplat(); vibe([0,90]); }
      if(eA0<=10.10 && eA1>10.10) sfxFlush();
      if(eA0<=10.60 && eA1>10.60) sfxWin();
      }
      for(var wq=parts.length-1;wq>=0;wq--){
        var wp2=parts[wq]; wp2.x+=wp2.vx*f; wp2.y+=wp2.vy*f; wp2.vy+=0.02*f; wp2.r+=0.1*f; wp2.life-=wp2.dr*f;
        if(wp2.life<=0) parts.splice(wq,1);
      }
      if(winT<=0){ state="entry"; entryLock=22; entryIdx=0; entryL=[0,0,0]; savedIdx=-1; }
    }
    if(state==="tutorial"){
      var tdt=f/60, tsp=2.4;
      tutT-=tdt;
      var o=tutObj;
      if(o && tutApexHold<=0) o.x-=tsp*f;   // durante la dimostrazione il tempo si ferma
      if(tutGround()) tutLeg+=f*0.9;

      // dimostrazione automatica se il giocatore non agisce
      if(tutStep===0){
        if(!tutDidJump && o.x<PX+30 && tutGround()) tutJump();
      } else if(tutStep===1){
        if(!tutDidJump && o.x<PX+32 && tutGround()) tutJump();
        if(tutDidJump && !tutDidDouble && !tutGround() && tutVy>-3.2) tutJump();
      } else if(tutStep===2){

        ctx.strokeStyle="rgba(255,255,255,.20)"; ctx.lineWidth=1; ctx.strokeRect(44,162,W-88,20);
        centerText("VOLUME: "+VOLN[volIdx],176, volIdx===0?"rgba(255,255,255,.4)":GOLD,10,"800");
        if(Math.floor(blink/26)%2===0) centerText("tocca per riprendere",202,WHITE,11,"700");
        centerText("(o tasto laterale)",214,"rgba(255,255,255,.4)",9,"600");
        drawPauseBtn();
      }
      if(levelT>0 && !paused){
        ctx.save(); ctx.globalAlpha=Math.min(1,levelT/25);
        var slam=Math.max(0,(levelT-83)/12);
        centerText("LIVELLO "+level,128,lvlAcc(),Math.round(24+slam*26),"800");
        centerText(levelMsg(level),150,"rgba(255,255,255,.75)",10,"700");
        if(lvlPerfect) centerText("3 CUORI PIENI  +"+(100*DM()),168,HEART,11,"800");
        ctx.restore();
      }
    } else if(state==="entry"){
      for(var k=0;k<enemies.length;k++) drawEnemy(enemies[k]);
      drawParts();
      if(deathFlash>0){ ctx.globalAlpha=deathFlash/6*0.6; ctx.fillStyle="#fff"; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; deathFlash-=f; }
      ctx.fillStyle="rgba(10,10,11,.85)"; ctx.fillRect(0,0,W,H);
      centerText("GAME OVER",58,ORANGE,18,"800");
      centerText("SCORE "+pad4(score),80,WHITE,12,"700");
      centerText("INSERISCI LE INIZIALI",106,"rgba(255,255,255,.6)",9,"700");
      var xs=[W/2-44,W/2,W/2+44];
      for(var li=0;li<3;li++){
        var act=(li===entryIdx);
        ctx.font="800 34px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace";
        ctx.textAlign="center"; ctx.textBaseline="alphabetic";
        ctx.fillStyle= act ? ORANGE : "rgba(255,255,255,.85)";
        ctx.fillText(AB[entryL[li]],xs[li],166);
        ctx.fillStyle= act ? ORANGE : "rgba(255,255,255,.22)";
        ctx.fillRect(xs[li]-14,174,28,3);
        if(act && Math.floor(blink/16)%2===0){
          ctx.fillStyle=ORANGE;
          ctx.font="700 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace";
          ctx.fillText("\u25b2",xs[li],126);
          ctx.fillText("\u25bc",xs[li],194);
        }
      }
      ctx.textAlign="left";
      centerText("alto/basso: cambia lettera \u00b7 lati: scegli",216,"rgba(255,255,255,.45)",8,"600");
      centerText("tocca al centro: conferma",228,"rgba(255,255,255,.45)",8,"600");
      centerText("(sull'R1: rotella + tasto laterale)",240,"rgba(255,255,255,.35)",8,"600");
    } else if(state==="over"){
      for(var k2=0;k2<enemies.length;k2++) drawEnemy(enemies[k2]);
      drawPlayer(PX,py,0,0,true,false,false,false,blink,null);
      drawParts();
      ctx.fillStyle="rgba(10,10,11,.78)"; ctx.fillRect(0,44,W,206);
      centerText("GAME OVER",64,ORANGE,16,"800");
      centerText("SCORE "+pad4(score)+"   BEST "+pad4(best),78,WHITE,9,"700");
      centerText("COMBO MAX x"+stCombo+"  \u00b7  CATENA x"+stChain,92,"rgba(255,255,255,.55)",8,"700");
      centerText("SCHIACCIATI "+stSquash+"  \u00b7  PER UN PELO "+stNear+"  \u00b7  "+Math.floor(dist/100)+"0m",102,"rgba(255,255,255,.45)",8,"600");
      if(newUnl.length>0){
        ctx.save(); ctx.globalAlpha=0.6+0.4*Math.sin(blink*0.3);
        centerText("NUOVA SKIN: "+SKINS[newUnl[0]].n+"!",116,SKINS[newUnl[0]].c,11,"800");
        ctx.restore();
      }
      centerText("CLASSIFICA MONDIALE \u00b7 "+(mode==="sfida"?"SFIDA":"ARCADE"),(newUnl.length>0?130:118),"rgba(255,255,255,.5)",9,"700");
      var rows=worldFor(mode)||[], myR=-1;
      for(var wi=0;wi<rows.length;wi++){ if(rows[wi].n===lastName && rows[wi].s===score){ myR=wi; break; } }
      var rowY0=(newUnl.length>0?144:132);
      for(var si=0;si<Math.min(rows.length,7);si++){
        drawScoreRow(si+1,rows[si],rowY0+si*13, si===myR?GOLD:"rgba(255,255,255,.8)", si===myR);
      }
      if(rows.length===0){
        centerText(worldBusy?"carico la classifica mondiale...":(worldErr?"mondo non raggiungibile":"nessun punteggio: sei il primo!"),
          rowY0+8,"rgba(255,255,255,.4)",9,"600");
      }
      if(myR>=0) centerText("SEI "+(myR+1)+"\u00b0 AL MONDO!",244,GOLD,9,"800");
      else if(rows.length>0) centerText("in classifica ci sono i migliori del mondo",244,"rgba(255,255,255,.35)",7,"600");
      if(overLock<=0 && Math.floor(blink/28)%2===0) centerText("TAP PER RIPROVARE",262,WHITE,11,"700");
    }
    hdFrameEnd();
    requestAnimationFrame(loop);
  }

  try{ fitScreen(); }catch(e){}
  reset();
  sbFetchTop();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
